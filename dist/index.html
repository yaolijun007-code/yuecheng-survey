<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#F7F5F2">
<meta name="format-detection" content="telephone=no">
<title>芳华谱 · 女性健康寿命首诊评估</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{
    --klein:#2B5F75;--klein-deep:#1A3F52;--klein-light:#4A8FAF;
    --klein-glow:rgba(43,95,117,.06);--klein-glow-md:rgba(43,95,117,.10);--klein-glow-sm:rgba(43,95,117,.04);
    --gold:#C4A882;--gold-soft:#D4C4A8;--gold-glow:rgba(196,168,130,.08);
    --t1:#1E293B;--t2:#475569;--t3:#94A3B8;--t4:#CBD5E1;
    --bg:#F7F5F2;--bg-soft:#EDEAE6;--card:rgba(255,253,250,.92);--card-solid:#FFFDFA;
    --line:rgba(30,41,59,.06);--line-md:rgba(30,41,59,.10);--line-strong:rgba(43,95,117,.15);
    --r-sm:14px;--r-md:20px;--r-lg:24px;--r-xl:28px;
    --sh-blue:0 8px 24px rgba(43,95,117,.12),0 2px 6px rgba(43,95,117,.08);
    --ease:cubic-bezier(.22,.61,.36,1);--ease-in:cubic-bezier(.4,0,1,1);
    --safe-t:env(safe-area-inset-top,0);--safe-b:env(safe-area-inset-bottom,0);
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;overscroll-behavior:none;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Helvetica Neue","Microsoft YaHei",sans-serif;font-size:17px;line-height:1.65;color:var(--t1);background:var(--bg);text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;font-feature-settings:"kern","liga","calt"}
  input,textarea{user-select:text;-webkit-user-select:text}
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  .ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .ambient::before,.ambient::after{content:"";position:absolute;border-radius:50%;filter:blur(80px);opacity:.55}
  .ambient::before{width:60vw;height:60vw;top:-20vw;right:-20vw;background:radial-gradient(circle,rgba(43,95,117,.10),transparent 65%)}
  .ambient::after{width:50vw;height:50vw;bottom:-15vw;left:-15vw;background:radial-gradient(circle,rgba(196,168,130,.06),transparent 65%)}
  #app{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;padding-top:var(--safe-t);padding-bottom:var(--safe-b)}
  .topbar{flex-shrink:0;display:flex;align-items:center;gap:14px;padding:10px 18px 14px;min-height:48px}
  .topbar.hide{visibility:hidden}
  .icon-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--t2);transition:background .25s var(--ease),transform .15s var(--ease)}
  .icon-btn:active{background:var(--line);transform:scale(.92)}
  .icon-btn svg{width:18px;height:18px;stroke-width:2}
  .progress{flex:1;height:2px;background:var(--line);border-radius:99px;overflow:hidden;position:relative}
  .progress-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--klein) 0%,var(--klein-light) 100%);border-radius:99px;width:0%;transition:width .6s cubic-bezier(.65,0,.35,1)}
  .progress-fill::after{content:"";position:absolute;right:0;top:0;bottom:0;width:24px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.6));border-radius:99px}
  .progress-label{font-size:11px;color:var(--t3);letter-spacing:.5px;font-variant-numeric:tabular-nums;min-width:38px;text-align:right}
  .main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative}
  .screen{min-height:100%;padding:8px 24px 32px;display:flex;flex-direction:column;animation:screenIn .55s var(--ease) both}
  .screen.leaving{animation:screenOut .25s var(--ease-in) both}
  @keyframes screenIn{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes screenOut{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-6px)}}
  .stagger>*{animation:fadeUp .6s var(--ease) both}
  .stagger>*:nth-child(1){animation-delay:.05s}.stagger>*:nth-child(2){animation-delay:.15s}
  .stagger>*:nth-child(3){animation-delay:.25s}.stagger>*:nth-child(4){animation-delay:.35s}
  .stagger>*:nth-child(5){animation-delay:.45s}.stagger>*:nth-child(6){animation-delay:.55s}
  .stagger>*:nth-child(7){animation-delay:.65s}.stagger>*:nth-child(8){animation-delay:.75s}
  @keyframes fadeUp{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11px;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;font-weight:500}
  .eyebrow::before{content:"";width:18px;height:1px;background:var(--gold);opacity:.6}
  .h-display{font-size:30px;line-height:1.18;font-weight:600;letter-spacing:-.5px;color:var(--t1)}
  .h-large{font-size:26px;line-height:1.28;font-weight:600;letter-spacing:-.3px;color:var(--t1)}
  .h-medium{font-size:21px;line-height:1.35;font-weight:600;letter-spacing:-.2px;color:var(--t1)}
  .body-md{font-size:15px;line-height:1.62;color:var(--t2)}
  .body-sm{font-size:13px;line-height:1.6;color:var(--t3)}
  .micro{font-size:11px;letter-spacing:.6px;color:var(--t3)}
  .accent{color:var(--klein)}
  .welcome{justify-content:space-between;padding-top:24px}
  .welcome .brand{display:flex;flex-direction:column;align-items:center;margin-top:32px}
  .brand-mark{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--klein) 0%,var(--klein-light) 100%);display:flex;align-items:center;justify-content:center;box-shadow:var(--sh-blue);margin-bottom:24px;position:relative}
  .brand-mark::after{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent 50%)}
  .brand-mark svg{width:32px;height:32px;color:#fff;position:relative;z-index:1}
  .brand-name{font-size:13px;color:var(--t2);letter-spacing:2px;font-weight:400}
  .brand-name .center{color:var(--klein);font-weight:500}
  .social-proof{margin-top:18px;display:inline-flex;align-self:flex-start;align-items:center;gap:10px;padding:7px 14px 7px 12px;background:linear-gradient(135deg,rgba(184,134,11,.10) 0%,rgba(184,134,11,.03) 100%);border:1px solid rgba(184,134,11,.22);border-radius:24px;font-size:13px;color:var(--t2);transition:all .3s var(--ease)}
  .social-proof.bump{transform:scale(1.04);background:linear-gradient(135deg,rgba(184,134,11,.20) 0%,rgba(184,134,11,.08) 100%);border-color:rgba(184,134,11,.4)}
  .social-proof .sp-pulse{position:relative;width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 0 rgba(184,134,11,.6);animation:sp-pulse 2s ease-in-out infinite}
  .social-proof .sp-pulse::after{content:"";position:absolute;inset:-3px;border-radius:50%;border:1.5px solid var(--gold);opacity:0;animation:sp-ring 2s ease-out infinite}
  .social-proof .sp-num{color:var(--gold);font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:.3px;margin:0 1px;display:inline-block;min-width:40px;text-align:center}
  @keyframes sp-pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(184,134,11,.5)}50%{transform:scale(1.2);box-shadow:0 0 0 4px rgba(184,134,11,0)}}
  @keyframes sp-ring{0%{transform:scale(.7);opacity:.7}100%{transform:scale(2);opacity:0}}
  .welcome-hero{margin-top:60px}
  .welcome-hero .title-cn{font-size:38px;line-height:1.15;font-weight:600;letter-spacing:-.8px;color:var(--t1);margin-bottom:10px}
  .welcome-hero .title-cn .accent{background:linear-gradient(135deg,var(--klein) 0%,var(--klein-light) 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .welcome-hero .title-en{font-size:13px;letter-spacing:3px;color:var(--t3);text-transform:uppercase;font-weight:300;margin-top:14px}
  .welcome-hero .subtitle{margin-top:28px;font-size:16px;line-height:1.7;color:var(--t2);max-width:300px}
  .meta-row{display:flex;gap:0;margin-top:36px;background:var(--card);backdrop-filter:blur(20px) saturate(1.6);-webkit-backdrop-filter:blur(20px) saturate(1.6);border:1px solid var(--line);border-radius:var(--r-md);padding:18px 4px}
  .meta-item{flex:1;text-align:center;position:relative}
  .meta-item+.meta-item::before{content:"";position:absolute;left:0;top:20%;bottom:20%;width:1px;background:var(--line)}
  .meta-item .num-val{font-size:22px;font-weight:600;color:var(--t1);letter-spacing:-.3px}
  .meta-item .num-val .unit{font-size:12px;color:var(--t3);font-weight:400;margin-left:2px}
  .meta-item .lbl{font-size:11px;color:var(--t3);margin-top:4px;letter-spacing:.5px}
  .intro-list{margin-top:36px;display:flex;flex-direction:column;gap:18px}
  .intro-step{display:flex;gap:16px;align-items:flex-start;padding:18px 18px;background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--line);border-radius:var(--r-md)}
  .intro-step .step-num{flex-shrink:0;width:34px;height:34px;border-radius:50%;background:var(--klein-glow);color:var(--klein);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;border:1px solid var(--line-strong)}
  .intro-step .step-content h4{font-size:15px;font-weight:600;color:var(--t1);margin:6px 0 4px}
  .intro-step .step-content p{font-size:13px;color:var(--t3);margin:0;line-height:1.5}
  .privacy-card{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--line);border-radius:var(--r-lg);padding:24px;margin-top:24px}
  .privacy-list{display:flex;flex-direction:column;gap:18px;margin-top:8px}
  .privacy-item{display:flex;gap:14px;align-items:flex-start}
  .privacy-icon{flex-shrink:0;width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--klein-glow),var(--klein-glow-sm));display:flex;align-items:center;justify-content:center;color:var(--klein)}
  .privacy-icon svg{width:16px;height:16px}
  .privacy-item h4{font-size:14px;font-weight:600;color:var(--t1);margin:6px 0 2px}
  .privacy-item p{font-size:12.5px;color:var(--t3);margin:0;line-height:1.55}
  .q-head{margin-bottom:24px}
  .q-title{font-size:23px;line-height:1.35;font-weight:600;color:var(--t1);letter-spacing:-.2px;margin-top:14px}
  .q-desc{margin-top:10px;font-size:14px;line-height:1.6;color:var(--t3)}
  /* 学术注释 — 低调灰底纯文字 */
  .q-note{margin-top:10px;margin-bottom:2px;font-size:11.5px;line-height:1.72;color:var(--t3);padding:9px 13px;background:rgba(30,41,59,.026);border-radius:9px}
  /* 系统名 + 品牌层级 */
  .sys-label{font-size:10.5px;letter-spacing:3px;color:var(--t4);text-transform:uppercase;font-weight:400;text-align:center}
  .brand-mark-v2{width:52px;height:52px;border-radius:15px;background:linear-gradient(135deg,var(--klein-deep),var(--klein));display:flex;align-items:center;justify-content:center;margin:18px auto 14px;position:relative;overflow:hidden;box-shadow:var(--sh-blue)}
  .brand-mark-v2::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18),transparent 55%)}
  .brand-mark-v2 svg{width:26px;height:26px;color:#fff;position:relative;z-index:1}
  .brand-cn{font-size:34px;font-weight:700;letter-spacing:10px;color:var(--t1);text-align:center;padding-left:10px}
  .brand-sub-tag{font-size:12px;letter-spacing:2px;color:var(--t3);text-align:center;margin-top:5px}
  .brand-divider{width:28px;height:1px;background:var(--t4);margin:14px auto}
  .options{display:flex;flex-direction:column;gap:10px;margin-top:8px}
  .option{position:relative;background:var(--card);border:1.5px solid var(--line);border-radius:var(--r-md);padding:15px 18px;display:flex;align-items:center;gap:14px;transition:all .22s var(--ease);cursor:pointer;min-height:56px;box-shadow:0 1px 3px rgba(30,41,59,.05)}
  .option:active{transform:scale(.987)}
  .option.selected{background:linear-gradient(135deg,var(--klein) 0%,var(--klein-light) 100%);border-color:var(--klein);box-shadow:var(--sh-blue)}
  .option.selected .option-label,.option.selected .option-idx{color:#fff}
  .option.selected .option-idx{background:rgba(255,255,255,.18);border-color:transparent}
  .option.selected .check{opacity:1;transform:scale(1)}
  .option-idx{flex-shrink:0;width:28px;height:28px;border-radius:50%;border:1.5px solid var(--line-md);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--t3);font-weight:500;transition:all .25s var(--ease)}
  .option-label{flex:1;font-size:16px;color:var(--t1);font-weight:400;line-height:1.4;transition:color .25s var(--ease)}
  .check{margin-left:8px;opacity:0;transform:scale(.6);transition:opacity .25s var(--ease),transform .25s var(--ease);color:#fff}
  .check svg{width:18px;height:18px;stroke-width:2.5}
  .multi-hint{margin-top:14px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t3)}
  .multi-hint .count{color:var(--klein);font-weight:500;font-variant-numeric:tabular-nums}
  .num-input-group{display:flex;flex-direction:column;gap:14px;margin-top:8px}
  .num-input-field{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.5px solid var(--line);border-radius:var(--r-md);padding:16px 18px;display:flex;align-items:center;gap:14px;transition:border-color .25s var(--ease)}
  .num-input-field:focus-within{border-color:var(--klein)}
  .num-input-field .lbl{font-size:14px;color:var(--t2);min-width:48px}
  .num-input-field input{flex:1;border:none;outline:none;background:transparent;font-size:22px;font-weight:500;color:var(--t1);font-variant-numeric:tabular-nums;letter-spacing:.5px;text-align:right;padding:0;min-width:0}
  .num-input-field .unit{font-size:14px;color:var(--t3);min-width:28px;text-align:left}
  .profile-input-group{display:flex;flex-direction:column;gap:12px;margin-top:8px}
  .profile-input-field{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.5px solid var(--line);border-radius:var(--r-md);padding:14px 18px;display:flex;align-items:center;gap:14px;transition:border-color .25s var(--ease)}
  .profile-input-field:focus-within{border-color:var(--klein)}
  .profile-input-field.error{border-color:#d94e4e}
  .profile-input-field .lbl{font-size:14px;color:var(--t2);min-width:64px;font-weight:500}
  .profile-input-field input{flex:1;border:none;outline:none;background:transparent;font-size:16px;color:var(--t1);padding:0;min-width:0;letter-spacing:.2px}
  .profile-input-field input::placeholder{color:var(--t4)}
  .profile-hint{margin-top:10px;font-size:12px;color:var(--t4);text-align:center;letter-spacing:.2px}
  .profile-hint .err{color:#d94e4e}
  .intro-tip{margin-top:24px;display:flex;gap:12px;padding:14px 16px;background:linear-gradient(135deg,rgba(184,134,11,.08) 0%,rgba(184,134,11,.025) 100%);border:1px solid rgba(184,134,11,.20);border-radius:12px}
  .intro-tip svg{flex-shrink:0;width:18px;height:18px;color:var(--gold);margin-top:2px}
  .intro-tip strong{font-size:13.5px;color:var(--t1);font-weight:600;letter-spacing:.1px;display:block;margin-bottom:5px}
  .intro-tip p{font-size:12.5px;color:var(--t3);margin:0;line-height:1.65}
  .sensitive-list{display:flex;flex-direction:column;gap:12px;margin-top:24px}
  .sensitive-item{display:flex;gap:12px;align-items:flex-start;padding:14px 16px;background:rgba(0,47,167,.025);border-left:2.5px solid var(--klein-light);border-radius:10px}
  .sensitive-item .sn-idx{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--klein-glow);color:var(--klein);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:11px;margin-top:1px;letter-spacing:0;font-variant-numeric:tabular-nums}
  .sensitive-item .sn-content h4{font-size:14px;font-weight:600;color:var(--t1);margin:0 0 4px;letter-spacing:.1px;line-height:1.4}
  .sensitive-item .sn-content p{font-size:12.5px;color:var(--t3);margin:0;line-height:1.65}
  .btn-share{background:#fff;color:var(--gold);border:1.5px solid rgba(184,134,11,.4);font-weight:500}
  .btn-share:active{background:rgba(184,134,11,.06)}
  .btn-share .share-ico{display:inline-flex;width:16px;height:16px;margin-right:8px;vertical-align:-2px}
  .toast{position:fixed;left:50%;bottom:60px;transform:translateX(-50%) translateY(20px);background:rgba(20,20,30,.92);color:#fff;padding:11px 22px;border-radius:30px;font-size:13px;letter-spacing:.2px;opacity:0;transition:all .3s var(--ease);z-index:9999;pointer-events:none;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 8px 24px rgba(0,0,0,.18)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .wheel-picker{margin-top:8px;background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.5px solid var(--line);border-radius:var(--r-lg);padding:14px 0;position:relative;display:flex;gap:0;overflow:hidden}
  .wheel-picker::before,.wheel-picker::after{content:"";position:absolute;left:0;right:0;height:62px;pointer-events:none;z-index:2}
  .wheel-picker::before{top:0;background:linear-gradient(180deg,rgba(255,255,255,.95) 0%,rgba(255,255,255,0) 100%)}
  .wheel-picker::after{bottom:0;background:linear-gradient(0deg,rgba(255,255,255,.95) 0%,rgba(255,255,255,0) 100%)}
  .wheel-picker .selector{position:absolute;left:18px;right:18px;top:50%;transform:translateY(-50%);height:42px;border-radius:12px;background:var(--klein-glow);border-top:1px solid var(--line-strong);border-bottom:1px solid var(--line-strong);pointer-events:none;z-index:1}
  .wheel-col{flex:1;height:200px;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;-ms-overflow-style:none;text-align:center;-webkit-overflow-scrolling:touch}
  .wheel-col::-webkit-scrollbar{display:none}
  .wheel-col .wheel-pad{height:80px}
  .wheel-col .wheel-item{height:40px;line-height:40px;font-size:18px;color:var(--t3);scroll-snap-align:center;font-variant-numeric:tabular-nums;letter-spacing:.5px;transition:color .2s var(--ease),font-weight .2s var(--ease)}
  .wheel-col .wheel-item.active{color:var(--klein);font-weight:600;font-size:20px}
  .scale-options{display:flex;flex-direction:column;gap:8px;margin-top:8px}
  .scale-row{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.5px solid var(--line);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:12px;transition:all .25s var(--ease);cursor:pointer}
  .scale-row:active{transform:scale(.985)}
  .scale-row.selected{background:linear-gradient(135deg,var(--klein) 0%,var(--klein-light) 100%);border-color:var(--klein);box-shadow:var(--sh-blue)}
  .scale-row.selected .scale-text,.scale-row.selected .scale-dot{color:#fff}
  .scale-row.selected .scale-bar{background:rgba(255,255,255,.3)}
  .scale-row.selected .scale-bar-fill{background:#fff}
  .scale-dot{font-size:12px;color:var(--t3);min-width:18px;font-variant-numeric:tabular-nums}
  .scale-text{flex:1;font-size:15px;color:var(--t1);transition:color .25s var(--ease)}
  .scale-bar{width:60px;height:3px;background:var(--line);border-radius:99px;overflow:hidden}
  .scale-bar-fill{height:100%;background:var(--klein);border-radius:99px;transition:background .25s var(--ease)}
  .footer{flex-shrink:0;padding:16px 24px calc(20px + var(--safe-b));background:linear-gradient(180deg,rgba(251,252,254,0) 0%,rgba(251,252,254,.95) 30%,var(--bg) 100%);position:relative;z-index:5}
  .footer.hide{display:none}
  .btn{width:100%;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:16px;font-weight:500;letter-spacing:.5px;transition:all .2s var(--ease);position:relative;overflow:hidden}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:linear-gradient(135deg,var(--klein) 0%,var(--klein-light) 100%);color:#fff;box-shadow:var(--sh-blue)}
  .btn-primary:disabled{opacity:.35;box-shadow:none;cursor:not-allowed}
  .btn-primary:disabled:active{transform:none}
  .btn-primary::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent 60%);pointer-events:none}
  .btn-ghost{background:transparent;color:var(--t2);font-size:14px;height:44px}
  .btn-secondary{background:var(--bg-soft);color:var(--t1)}
  .btn .arrow{display:inline-flex;transition:transform .25s var(--ease)}
  .btn:active .arrow{transform:translateX(3px)}
  .btn-meta{font-size:11px;color:var(--t3);text-align:center;margin-top:8px;letter-spacing:.3px}
  .q-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--t3);letter-spacing:1px;margin-bottom:14px}
  .q-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--t4)}
  .q-meta .seg{color:var(--klein);font-weight:500;letter-spacing:1.2px}
  .transition-screen{justify-content:center;align-items:center;text-align:center}
  .transition-icon{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,var(--klein-glow),transparent);border:1px solid var(--line-strong);display:flex;align-items:center;justify-content:center;margin-bottom:28px;animation:pulse 2.2s var(--ease) infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--klein-glow-md)}50%{box-shadow:0 0 0 16px rgba(43,95,117,0)}}
  .transition-icon svg{width:36px;height:36px;color:var(--klein)}
  .transition-title{font-size:24px;font-weight:600;color:var(--t1);letter-spacing:-.3px;margin:0 0 8px}
  .transition-sub{font-size:14px;color:var(--t3);line-height:1.6;max-width:280px;margin:0 auto}
  .transition-tag{display:inline-flex;align-items:center;gap:6px;margin-top:20px;padding:8px 16px;border-radius:99px;background:var(--klein-glow);color:var(--klein);font-size:12px;letter-spacing:1px;font-weight:500;border:1px solid var(--line-strong)}
  .compound-block{margin-top:20px;padding-top:20px;border-top:1px solid var(--line);animation:fadeUp .5s var(--ease) both}
  .compound-block.first{margin-top:0;padding-top:0;border-top:none}
  .compound-block .sub-label{font-size:13px;color:var(--t3);margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .compound-block .sub-label::before{content:"";width:10px;height:1px;background:var(--klein);opacity:.4}
  .submit-screen{justify-content:center;align-items:center;text-align:center}
  .submit-orb{position:relative;width:120px;height:120px;margin-bottom:32px}
  .submit-orb .ring{position:absolute;inset:0;border-radius:50%;border:1px solid var(--line-strong);animation:ringRotate 8s linear infinite}
  .submit-orb .ring.r2{inset:-12px;border-style:dashed;opacity:.5;animation-duration:14s;animation-direction:reverse}
  .submit-orb .core{position:absolute;inset:24px;border-radius:50%;background:linear-gradient(135deg,var(--klein) 0%,var(--klein-light) 100%);box-shadow:var(--sh-blue);display:flex;align-items:center;justify-content:center;animation:coreBreathe 3.2s var(--ease) infinite}
  .submit-orb .core svg{width:32px;height:32px;color:#fff}
  @keyframes ringRotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  @keyframes coreBreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  .feedback-card{background:var(--card);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border:1px solid var(--line);border-radius:var(--r-lg);padding:24px;margin-top:18px}
  .six-dim-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
  .dim-cell{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 10px;text-align:center;transition:all .3s var(--ease)}
  .dim-cell .dim-icon{width:32px;height:32px;border-radius:10px;margin:0 auto 8px;background:var(--klein-glow);display:flex;align-items:center;justify-content:center;color:var(--klein)}
  .dim-cell .dim-icon svg{width:16px;height:16px}
  .dim-cell .dim-name{font-size:12px;color:var(--t1);font-weight:500;line-height:1.3}
  .dim-cell .dim-en{font-size:9px;color:var(--t4);letter-spacing:1px;margin-top:2px}
  .clinic-alert{margin-top:18px;padding:20px;border-radius:var(--r-md);border:1px solid;position:relative;overflow:hidden}
  .clinic-alert.s-level{background:linear-gradient(135deg,rgba(196,168,130,.06),rgba(196,168,130,.02));border-color:rgba(196,168,130,.25)}
  .clinic-alert.s-level .alert-tag{background:var(--gold);color:#fff}
  .clinic-alert.high-level{background:var(--klein-glow);border-color:var(--line-strong)}
  .clinic-alert.high-level .alert-tag{background:var(--klein);color:#fff}
  .alert-tag{display:inline-block;font-size:10px;letter-spacing:1.5px;padding:3px 10px;border-radius:99px;font-weight:600;margin-bottom:10px}
  .alert-title{font-size:16px;font-weight:600;color:var(--t1);margin:0 0 6px;letter-spacing:-.2px}
  .alert-desc{font-size:13px;color:var(--t2);line-height:1.6;margin:0}
  .timeline{margin-top:18px;padding:0}
  .timeline-item{display:flex;gap:14px;padding:12px 0;position:relative}
  .timeline-item::before{content:"";position:absolute;left:9px;top:32px;bottom:-6px;width:1px;background:var(--line-md)}
  .timeline-item:last-child::before{display:none}
  .timeline-dot{flex-shrink:0;width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid var(--klein);display:flex;align-items:center;justify-content:center;margin-top:2px;position:relative;z-index:1}
  .timeline-dot.done{background:var(--klein)}
  .timeline-dot.done::after{content:"";width:5px;height:5px;border-radius:50%;background:#fff}
  .timeline-content h5{font-size:14px;font-weight:500;color:var(--t1);margin:0 0 2px}
  .timeline-content p{font-size:12px;color:var(--t3);margin:0;line-height:1.5}
  .modal-mask{position:fixed;inset:0;background:rgba(10,14,39,.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:100;display:none;align-items:flex-end;justify-content:center;animation:maskIn .25s var(--ease) both}
  .modal-mask.show{display:flex}
  @keyframes maskIn{from{opacity:0}to{opacity:1}}
  .modal{width:100%;background:#fff;border-radius:22px 22px 0 0;padding:24px 24px calc(24px + var(--safe-b));animation:modalUp .35s var(--ease) both}
  @keyframes modalUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal h3{font-size:18px;font-weight:600;margin:0 0 8px}
  .modal p{font-size:14px;color:var(--t2);margin:0 0 20px;line-height:1.6}
  .modal-actions{display:flex;gap:10px}
  .modal-actions .btn{height:48px;font-size:15px}
  .mt-auto{margin-top:auto}
</style>
</head>
<body>
<div class="ambient"></div>
<div id="app">
  <header class="topbar" id="topbar">
    <button class="icon-btn" id="backBtn" aria-label="返回">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    </button>
    <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label num" id="progressLabel">0 / 22</div>
  </header>
  <main class="main" id="main"></main>
  <footer class="footer hide" id="footer">
    <button class="btn btn-primary" id="primaryBtn">
      <span id="primaryBtnText">继续</span>
      <span class="arrow"><svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg></span>
    </button>
    <div class="btn-meta" id="btnMeta"></div>
  </footer>
</div>
<div class="modal-mask" id="exitModal">
  <div class="modal">
    <h3>确定要离开评估？</h3>
    <p>您已填写的内容会暂存在本机，可以随时回到此处继续。</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="App.closeExitModal()">继续填写</button>
      <button class="btn btn-primary" onclick="App.exitConfirm()">暂存并离开</button>
    </div>
  </div>
</div>
<script>
const STEPS=[
  {id:'welcome',type:'welcome',showTopbar:false,showFooter:false},
  {id:'intro',type:'intro',showTopbar:false,showFooter:true,btnText:'我已知晓并开始评估',btnMeta:'22–23 题 · 约 7–9 分钟 · 信息加密存储'},
  {id:'profile',type:'question',showTopbar:true,showFooter:true,section:'基本信息',question:{field:'PROFILE',type:'profile-input',title:'请留下您的联系方式',desc:'用于评估完成后专业医师与您联系',mechanism:'所有信息端到端加密存储，仅授权专业医师调阅，可随时申请删除。',fields:[{key:'NAME',label:'姓名',type:'text',placeholder:'请输入您的姓名',autocomplete:'name'},{key:'PHONE',label:'手机号',type:'tel',placeholder:'11 位手机号',autocomplete:'tel'},{key:'CITY',label:'所在城市',type:'text',placeholder:'例如 上海',autocomplete:'address-level2'}]}},
  {id:'A1',type:'question',section:'A 段·基础信息',question:{field:'BIRTH',type:'date',title:'您的出生年月',mechanism:'时序年龄是衰老评估的核心基线变量，与生理年龄、表型年龄交叉比对可识别加速衰老或健康老化的轨迹差异（López-Otín 等，Cell, 2023 衰老标志综述）。'}},
  {id:'A2',type:'question',section:'A 段·基础信息',question:{field:'MENO',type:'single',title:'您目前的月经与生育状态',desc:'如同时符合多项，请优先选择特殊状态',options:[{v:'④',label:'怀孕中'},{v:'⑤',label:'产后 2 年内'},{v:'⑥',label:'备孕中'},{v:'⑦',label:'哺乳期暂时停经'},{v:'①',label:'月经规律'},{v:'②',label:'月经不规律但未停经'},{v:'③',label:'已停经 ≥ 1 年'}],mechanism:'女性的生理状态对应不同的激素环境与衰老轨迹，育龄期、围产期、围绝经期、绝经后期的衰老机制差异显著，需匹配差异化评估路径（参考 STRAW+10 生殖衰老分期标准）。'}},
  {id:'A3',type:'question',section:'A 段·基础信息',question:{field:'HW',type:'number-dual',title:'您的身高与体重',fields:[{key:'HT',label:'身高',unit:'cm',min:130,max:200,placeholder:'162'},{key:'WT',label:'体重',unit:'kg',min:30,max:150,placeholder:'52'}],mechanism:'BMI 与体脂率是代谢健康与全因死亡风险的独立预测因子，需与体检报告中的腰围、内脏脂肪、HbA1c 等指标共同构成代谢衰老评估。'}},
  {id:'A4',type:'question',section:'A 段·基础信息',question:{field:'WT3Y',type:'single',title:'与 3 年前相比，您的体重变化',options:[{v:'①',label:'减轻 3kg 以上'},{v:'②',label:'基本不变'},{v:'③',label:'增加 3–5kg'},{v:'④',label:'增加 5–10kg'},{v:'⑤',label:'增加 10kg 以上'}],mechanism:'中年期体重增加 ≥ 5kg 与心血管事件风险上升约 30% 显著相关（Framingham 队列研究），中央型脂肪堆积更与胰岛素抵抗、慢性炎症（Inflammaging）密切相关。'}},
  {id:'A5',type:'question',section:'A 段·基础信息',question:{field:'EXISTING_DATA',type:'multi',title:'您已有以下哪些检测或评估数据？',desc:'不需要上传，仅用于了解您的评估基础',mechanism:'已有的多组学数据可显著提升评估精度。表观遗传时钟、端粒长度、线粒体功能、肠道菌群等指标与传统体检报告交叉分析后，能更精准识别您的衰老速度与轨迹（多组学整合是长寿医学的核心方法）。',maxSelect:11,exclusiveValue:'⑪',options:[{v:'①',label:'近 1 年内常规体检报告'},{v:'②',label:'性激素六项'},{v:'③',label:'AMH 或窦卵泡数 AFC'},{v:'④',label:'肠道菌群检测（16S 或宏基因组）'},{v:'⑤',label:'端粒长度检测'},{v:'⑥',label:'线粒体功能检测'},{v:'⑦',label:'表观遗传时钟（PhenoAge / GrimAge 等）'},{v:'⑧',label:'骨密度（DXA）'},{v:'⑨',label:'基因检测（健康 / 疾病风险）'},{v:'⑩',label:'其他多组学（蛋白质组 / 代谢组等）'},{v:'⑪',label:'都没有'}]}},
  {id:'B1',type:'question',section:'B 段·主观觉察',question:{field:'LOOK',type:'scale',title:'您觉得自己目前看起来比实际年龄……',options:[{v:'①',label:'年轻 5 岁以上'},{v:'②',label:'年轻 3–5 岁'},{v:'③',label:'年轻 1–3 岁'},{v:'④',label:'相符'},{v:'⑤',label:'老 1–3 岁'},{v:'⑥',label:'老 3–5 岁'},{v:'⑦',label:'老 5 岁以上'}],mechanism:'主观衰老感（Subjective Age）是国际衰老研究公认的健康寿命与全因死亡率独立预测因子，往往早于客观指标变化（Stephan 等，Psychosomatic Medicine, 2018）。'}},
  {id:'B2',type:'question',section:'B 段·主观觉察',question:{field:'CHG5Y',type:'multi',title:'与 5 年前相比，您身体最明显的变化',desc:'请选择 1–3 项最显著的变化',maxSelect:3,exclusiveValue:'⑩',options:[{v:'①',label:'精力下降'},{v:'②',label:'睡眠变差'},{v:'③',label:'皮肤变化（暗沉/松弛/皱纹/色斑）'},{v:'④',label:'体重增加且难减'},{v:'⑤',label:'性欲降低'},{v:'⑥',label:'月经变化'},{v:'⑦',label:'情绪波动'},{v:'⑧',label:'记忆力下降'},{v:'⑨',label:'关节不适'},{v:'⑩',label:'没有明显变化'}],mechanism:'多系统主观觉察是衰老的早期信号，常先于检测指标 2–5 年出现，与表观遗传时钟的早期偏移相符（Levine 等，Aging, 2018）。'}},
  {id:'B3',type:'question',section:'B 段·主观觉察',question:{field:'PEER',type:'scale',title:'与同龄女性相比，您对自己整体状态的位置评价',options:[{v:'①',label:'明显更好'},{v:'②',label:'略好'},{v:'③',label:'一般'},{v:'④',label:'略差'},{v:'⑤',label:'明显更差'}],mechanism:'同龄比较型自评健康（Peer-comparative health rating）在大型队列研究中是预测衰老速率的关键指标，与端粒长度、炎症标志物存在显著相关性。'}},
  {id:'C1',type:'question',section:'C 段·健康目标',question:{field:'GOAL',type:'single',title:'您希望保持当前的健康活力状态到几岁？',desc:'选择您内心最真实的期望',options:[{v:'①',label:'60 岁'},{v:'②',label:'65 岁'},{v:'③',label:'70 岁'},{v:'④',label:'75 岁'},{v:'⑤',label:'80 岁'},{v:'⑥',label:'85 岁以上'}],mechanism:'健康寿命（Healthspan）目标设定是长寿医学个性化方案的起点，决定了干预强度、监测频率与长期管理策略（Olshansky, Journal of Gerontology, 2018）。'}},
  {id:'C2',type:'question',section:'C 段·健康目标',question:{field:'TOP',type:'single',title:'如果只能优先改善一项，您最想先改善的是？',options:[{v:'①',label:'精力与抗疲劳'},{v:'②',label:'睡眠质量'},{v:'③',label:'皮肤外貌'},{v:'④',label:'体重与身材'},{v:'⑤',label:'性和谐与亲密关系'},{v:'⑥',label:'情绪状态'},{v:'⑦',label:'月经与激素'},{v:'⑧',label:'认知与专注'}],mechanism:'主观最困扰的维度往往是依从性最高的干预方向；从客户偏好出发设计方案，可显著提升 1 年留存率与方案完成度。'}},
  {id:'D1',type:'question',section:'D 段·六维快筛',question:{field:'CV',type:'multi',title:'心血管与代谢',desc:'近半年您出现过哪些？',maxSelect:7,exclusiveValue:'⑦',options:[{v:'①',label:'午后明显疲倦/能量崩塌'},{v:'②',label:'手脚冰凉'},{v:'③',label:'偶尔胸闷或心慌'},{v:'④',label:'血压波动'},{v:'⑤',label:'餐后嗜睡或血糖波动感'},{v:'⑥',label:'水肿（脸/腿/手）'},{v:'⑦',label:'都没有'}],mechanism:'心血管与代谢系统是衰老十四大特征中「线粒体功能障碍」「营养感应失调」「细胞间通讯改变」的核心载体（Cell, 2023 衰老标志综述）。'}},
  {id:'D2',type:'question',section:'D 段·六维快筛',question:{field:'RH',type:'multi',title:'激素与生殖',desc:'近半年您出现过哪些？',maxSelect:7,exclusiveValue:'⑧',dynamicHide:(a)=>['④','⑦','③'].includes(a.MENO)?['①','②','③']:[],options:[{v:'①',label:'月经周期变化'},{v:'②',label:'经量异常'},{v:'③',label:'经前症状加重'},{v:'④',label:'潮热或夜汗'},{v:'⑤',label:'阴道干涩或性交不适'},{v:'⑥',label:'性欲减退'},{v:'⑦',label:'头发变细或脱发增多'},{v:'⑧',label:'都没有'}],mechanism:'雌激素影响 400 余个靶器官，是女性衰老的中枢调控因子；围绝经期是衰老急转期（Critical Window）的关键窗口期。'}},
  {id:'D3',type:'question',section:'D 段·六维快筛',question:{field:'GUT',type:'multi',title:'肠道与免疫',desc:'近半年您出现过哪些？',maxSelect:7,exclusiveValue:'⑦',options:[{v:'①',label:'便秘或腹泻（每周 ≥ 2 次）'},{v:'②',label:'腹胀腹气频繁'},{v:'③',label:'食物耐受变差（乳制品/麸质/某些蔬果）'},{v:'④',label:'易感冒（每年 ≥ 3 次）'},{v:'⑤',label:'过敏反复（鼻炎/皮疹/食物）'},{v:'⑥',label:'口腔溃疡反复'},{v:'⑦',label:'都没有'}],mechanism:'肠道菌群失衡是衰老十四大特征之一「微生物群失调」的核心维度，与免疫炎症（Inflammaging）、神经退行、代谢健康深度耦合。'}},
  {id:'D4',type:'question',section:'D 段·六维快筛',question:{field:'BR',type:'multi',title:'神经与肌骨',desc:'近半年您出现过哪些？',maxSelect:7,exclusiveValue:'⑦',options:[{v:'①',label:'入睡困难或夜间易醒（每周 ≥ 3 天）'},{v:'②',label:'记忆或专注下降'},{v:'③',label:'情绪低落或易怒'},{v:'④',label:'关节响或晨僵'},{v:'⑤',label:'肌肉松弛感或上臂赘肉增多'},{v:'⑥',label:'平衡感下降或腰背疼'},{v:'⑦',label:'都没有'}],mechanism:'脑认知、骨密度、肌肉量是衰老的「三大功能性老化」靶点，直接决定老年期独立生活能力（健康预期寿命 HALE 的核心组成）。'}},
  {id:'sensitive-tip',type:'sensitive-intro',showTopbar:true,showFooter:true,btnText:'我已理解，继续评估',btnMeta:'端到端加密 · 仅医师查阅 · 可随时删除'},

/* 路由 */
function computeBranch(answers){
  const meno = answers.MENO;
  const age  = computeAge(answers.BIRTH);
  if(['④','⑤','⑦'].includes(meno)) return 'B2';
  if(meno === '⑥') return 'B1';
  if(meno === '③' && age < 40)  return 'B6';
  if(meno === '③' && age >= 40) return 'B5';
  if(meno === '②' && age < 40)  return 'B6';
  if(meno === '②' && age >= 40) return 'B4';
  if(meno === '①' && age < 35)  return 'B1';
  if(meno === '①' && age >= 35 && age < 48) return 'B3';
  if(meno === '①' && age >= 48) return 'B4';
  return 'B3';
}
function computeAge(birth){
  if(!birth || !birth.y) return 35;
  return new Date().getFullYear() - birth.y;
}

/* 社会证明：使用人数计算 */
function getSocialProofCount(){
  const START = new Date('2026-01-01T00:00:00').getTime();
  const BASE = 5247;
  const now = Date.now();
  if(now < START) return BASE;
  // 用日期作种子的伪随机，保证全球访客同一天看到一致数字
  const seedRand = (seed)=>{
    const x = Math.sin(seed * 9301 + 49297) * 233280;
    return x - Math.floor(x);
  };
  const daysSince = Math.floor((now - START) / 86400000);
  let total = BASE;
  // 历史天数稳定增长（每天 8–14）
  for(let d = 0; d < daysSince; d++){
    total += 8 + Math.floor(seedRand(d + 1) * 7);
  }
  // 当天的小时级渐进增长
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const hoursToday = (now - todayStart.getTime()) / 3600000;
  const todayPlanned = 8 + Math.floor(seedRand(daysSince + 1) * 7);
  total += Math.floor(todayPlanned * hoursToday / 24);
  // 本地用户提交记录（永久+1）
  try{
    const localInc = parseInt(localStorage.getItem('fhp_user_submitted') || '0', 10);
    if(!isNaN(localInc)) total += localInc;
  }catch(e){}
  return total;
}

/* 数字滚动动画 */
function animateCount(el, target, duration){
  if(!el) return;
  duration = duration || 1200;
  const start = Math.max(0, target - 13);
  const startTime = performance.now();
  function update(now){
    const elapsed = now - startTime;
    const progress = Math.min(1, elapsed / duration);
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = Math.floor(start + (target - start) * eased);
    el.textContent = current.toLocaleString();
    if(progress < 1) requestAnimationFrame(update);
    else el.textContent = target.toLocaleString();
  }
  requestAnimationFrame(update);
}

  if(Array.isArray(a.B6_RISK) && a.B6_RISK.some(v=>v!=='⑦')) T('S','POI_HIGH','卵巢早衰高危');
  if(Array.isArray(a.B6_TEST) && a.B6_TEST.includes('⑦') && Array.isArray(a.B6_PAT) && a.B6_PAT.length>0) T('S','POI_UNDX','卵巢早衰未诊断');
  if(Array.isArray(a.B6_SYM) && a.B6_SYM.filter(v=>v!=='⑧').length>=3) T('S','POI_SYM','卵巢早衰症候群');
  if(a.B6_FERT==='①') T('S','POI_FERT','卵巢早衰生育紧迫');
  if(['①','②'].includes(a.B2_MOOD)) T('S','PPD_RISK','产后抑郁风险');
  if(Array.isArray(a.B5_GSM)){
    const cnt = a.B5_GSM.filter(v=>v!=='⑧').length;
    if(cnt>=3 || a.B5_GSM.includes('⑦')) T('S','GSM_UNDX','绝经后 GSM 未就医');

  if(['④','⑤'].includes(a.B4_HOT)) T('high','VASOMOTOR_SEV','围绝经期重症');
  if(Array.isArray(a.B2_PELV) && a.B2_PELV.filter(v=>!['⑤','⑥'].includes(v)).length>=2) T('high','PELV_HIGH','骨盆底重症候群');
  if(Array.isArray(a.B2_VAG) && (a.B2_VAG.includes('①')||a.B2_VAG.includes('②'))) T('high','PERI_VAG_INF','围产期阴道感染');
  if(['②','③','④'].includes(a.B4_HRT)) T('high','HRT_EDU','HRT 教育窗口');
  if((Array.isArray(a.B4_SEX) && a.B4_SEX.filter(v=>!['⑥','⑦'].includes(v)).length>=3) ||
     (Array.isArray(a.B4_GSM) && a.B4_GSM.filter(v=>v!=='⑦').length>=3)) T('high','GSM_HIGH','GSM 重症');

  if(Array.isArray(a.B5_SARC) && a.B5_SARC.filter(v=>v!=='⑥').length>=3) T('high','SARC_RISK','肌少症风险');
  if(Array.isArray(a.B1_FAM) && (a.B1_FAM.includes('①')||a.B1_FAM.includes('⑤'))) T('high','EARLY_MENO_FAM','卵巢早衰家族风险');

  if(Array.isArray(a.CHG5Y) && a.CHG5Y.filter(v=>v!=='⑩').length>=2) T('mid','MULTI_DECLINE','多维度衰老');
  if(['④','⑤'].includes(a.PEER)) T('mid','SELF_DECLINE','自评衰老感强');
  if(Array.isArray(a.VAG) && a.VAG.filter(v=>v!=='⑦').length>=2) T('mid','VAG_DISRUPT','阴道微生态紊乱');
  if(Array.isArray(a.VAG) && a.VAG.includes('⑥')) T('mid','RECUR_INF','反复感染史');
  if(Array.isArray(a.B1_GUT_H)){
    const hits = ['②','③','④'].filter(v=>a.B1_GUT_H.includes(v));
    if(hits.length>=2) T('mid','GUT_DYSB','肠道菌群失衡风险');

  // 去重
  const seen = new Set();
  return tags.filter(t=>{ if(seen.has(t.code))return false; seen.add(t.code); return true; });

const App = {
  state:{ currentIdx:0, answers:{}, history:[0] },
  init(){ this.loadState(); this.bindEvents(); this.render(); },
  loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){ const data = JSON.parse(raw); if(data.answers) this.state.answers = data.answers; }
    }catch(e){}
  },
  saveState(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({answers:this.state.answers,ts:Date.now()})); }catch(e){}
  },
  bindEvents(){
    document.getElementById('backBtn').addEventListener('click', ()=>this.goBack());
    document.getElementById('primaryBtn').addEventListener('click', ()=>this.onPrimary());
  },

  computeNextIdx(){
    const cur = STEPS[this.state.currentIdx];
    if(cur.id === 'D5') return STEP_IDX['branch-transition'];
    if(cur.id === 'branch-transition'){
      const br = computeBranch(this.state.answers);
      const firstQ = STEPS.findIndex(s => s.id && s.id.startsWith(br+'.'));
      return firstQ >= 0 ? firstQ : STEP_IDX['submit'];
    }
    if(cur.id && /^B\d\.\d/.test(cur.id)){
      const br = computeBranch(this.state.answers);
      if(!cur.id.startsWith(br+'.')) return STEP_IDX['submit'];
      let nextIdx = this.state.currentIdx + 1;
      // skipIf/showIf 处理
      while(nextIdx < STEPS.length){
        const s = STEPS[nextIdx];
        if(!s.id || !s.id.startsWith(br+'.')) return STEP_IDX['submit'];
        if(s.skipIf && s.skipIf(this.state.answers)){
          if(s.skipValue !== undefined){
            this.state.answers[s.question.field] = s.skipValue;
            this.saveState();
          }
          nextIdx++; continue;
        }
        if(s.showIf && !s.showIf(this.state.answers)){ nextIdx++; continue; }
        return nextIdx;
      }
      return STEP_IDX['submit'];
    }
    if(cur.id === 'submit') return STEP_IDX['feedback'];
    let next = this.state.currentIdx + 1;
    while(next < STEPS.length){
      const s = STEPS[next];
      if(s.skipIf && s.skipIf(this.state.answers)){
        if(s.skipValue !== undefined){ this.state.answers[s.question.field] = s.skipValue; this.saveState(); }
        next++; continue;
      }
      if(s.showIf && !s.showIf(this.state.answers)){ next++; continue; }
      break;
    }
    return next < STEPS.length ? next : -1;
  },

  next(){
    const nextIdx = this.computeNextIdx();
    if(nextIdx < 0) return;
    this.navigate(nextIdx);
  },
  startEval(){
    // 欢迎页点击：先做一个 +1 的视觉反馈，再切换
    const card = document.querySelector('.social-proof');
    const el = document.getElementById('spNum');
    if(el){
      const cur = parseInt(el.textContent.replace(/,/g,''), 10) || getSocialProofCount();
      el.textContent = (cur + 1).toLocaleString();
    }
    if(card){
      card.classList.add('bump');
      setTimeout(()=>card.classList.remove('bump'), 380);
    }
    setTimeout(()=>this.next(), 180);
  },
  goBack(){
    const cur = STEPS[this.state.currentIdx];
    if(cur.type === 'welcome' || cur.type === 'feedback') return;
    if(this.state.history.length > 1){
      this.state.history.pop();
      const prev = this.state.history[this.state.history.length-1];
      this.navigateRaw(prev);
    }else{
      this.openExitModal();
    }
  },
  navigate(idx){ this.state.history.push(idx); this.navigateRaw(idx); },
  navigateRaw(idx){
    const main = document.getElementById('main');
    const cur = main.querySelector('.screen');
    if(cur){
      cur.classList.add('leaving');
      setTimeout(()=>{ this.state.currentIdx = idx; this.render(); document.getElementById('main').scrollTop = 0; }, 220);
    }else{
      this.state.currentIdx = idx; this.render();
    }
  },
  onPrimary(){
    const cur = STEPS[this.state.currentIdx];
    if(cur.type === 'welcome' || cur.type === 'intro' || cur.type === 'privacy' || cur.type === 'sensitive-intro' || cur.type === 'branch-transition' || cur.type === 'submit'){
      this.next(); return;
    }
    if(cur.type === 'question'){
      if(!this.isAnswered(cur.question, cur)){ this.shake(); return; }
      this.next();
    }
  },
  shake(){
    const btn = document.getElementById('primaryBtn');
    btn.animate([{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(-4px)'},{transform:'translateX(0)'}],{duration:300,easing:'ease-in-out'});
  },

  render(){
    const cur = STEPS[this.state.currentIdx];
    this.renderTopbar(cur);
    this.renderMain(cur);
    this.renderFooter(cur);
    this.updateProgress();
  },
  renderTopbar(step){
    const bar = document.getElementById('topbar');
    if(step.showTopbar === false) bar.classList.add('hide');
    else bar.classList.remove('hide');
  },
  renderFooter(step){
    const ft = document.getElementById('footer');
    if(step.showFooter === false){ ft.classList.add('hide'); return; }
    if(step.type === 'question'){
      const q = step.question;
      if(q.type === 'single' || q.type === 'scale'){ ft.classList.add('hide'); return; }
      ft.classList.remove('hide');
      document.getElementById('primaryBtnText').textContent = '继续';
      document.getElementById('btnMeta').textContent = '';
      document.getElementById('primaryBtn').disabled = !this.isAnswered(q, step);
      return;
    }
    ft.classList.remove('hide');
    document.getElementById('primaryBtnText').textContent = step.btnText || '继续';
    document.getElementById('btnMeta').textContent = step.btnMeta || '';
    document.getElementById('primaryBtn').disabled = false;
  },
  updateProgress(){
    const cur = STEPS[this.state.currentIdx];
    let pct = 0, label = '';
    if(cur.type === 'question'){
      if(cur.question.type === 'profile-input'){
        pct = 4; label = '';
      } else {
        const answered = this.state.history.filter(i => STEPS[i] && STEPS[i].type==='question' && STEPS[i].question.type !== 'profile-input').length;
        const total = 23;
        pct = Math.min(100, (answered/total)*100);
        label = `${answered} / ${total}`;
      }
    }else if(cur.type === 'welcome'){ pct = 0; label = ''; }
    else if(cur.type === 'intro'){ pct = 2; label = '2%'; }
    else if(cur.type === 'privacy'){ pct = 5; label = '5%'; }
    else if(cur.type === 'sensitive-intro'){ pct = 50; label = '50%'; }
    else if(cur.type === 'branch-transition'){ pct = 64; label = '64%'; }
    else if(cur.type === 'submit'){ pct = 100; label = '100%'; }
    else if(cur.type === 'feedback'){ pct = 100; label = ''; }
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = label;
  },
  renderMain(step){
    const main = document.getElementById('main');
    main.innerHTML = '';
    const screen = document.createElement('section');
    screen.className = 'screen ' + step.type;
    screen.dataset.step = step.id;
    if(step.type === 'welcome')                screen.innerHTML = this.tplWelcome();
    else if(step.type === 'intro')             screen.innerHTML = this.tplIntro();
    else if(step.type === 'privacy')           screen.innerHTML = this.tplPrivacy();
    else if(step.type === 'sensitive-intro')   screen.innerHTML = this.tplSensitiveIntro();
    else if(step.type === 'branch-transition') screen.innerHTML = this.tplBranchTransition();
    else if(step.type === 'submit')            screen.innerHTML = this.tplSubmit();
    else if(step.type === 'feedback')          screen.innerHTML = this.tplFeedback();
    else if(step.type === 'question')          screen.innerHTML = this.tplQuestion(step);
    main.appendChild(screen);
    if(step.type === 'welcome'){
      setTimeout(()=>{
        const el = document.getElementById('spNum');
        if(el) animateCount(el, getSocialProofCount(), 1200);
      }, 300);
    }
    if(step.type === 'question') this.bindQuestion(step, screen);
    if(step.type === 'submit')   setTimeout(()=>{ if(STEPS[this.state.currentIdx].id==='submit') this.next(); }, 1800);
    if(step.type === 'feedback')  setTimeout(()=>{ this.uploadToCloud(); }, 800);
  },

  tplCompound(q){

  bindQuestion(step, root){
    const q = step.question;
    if(q.type === 'single'){
      root.querySelectorAll('.option').forEach(el=>{
        el.addEventListener('click', ()=>{
          root.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));

          this.saveState();
          setTimeout(()=>this.next(), 320);
        });
      });
    }
    if(q.type === 'multi'){
      const max = q.maxSelect || 99;
      const excV = q.exclusiveValue;
      root.querySelectorAll('.option').forEach(el=>{
        el.addEventListener('click', ()=>{
          const v = el.dataset.v;
          let arr = this.state.answers[q.field] ? [...this.state.answers[q.field]] : [];
          if(excV){
            if(v === excV){
              const wasSelected = arr.includes(excV);
              arr = wasSelected ? [] : [excV];
              this.state.answers[q.field] = arr;
              this.saveState(); this.rerenderMulti(root); this.renderFooter(step);
              // 用户选中（而非取消）排他选项时，自动进入下一题
              if(!wasSelected){
                setTimeout(()=>this.next(), 320);
              }
              return;
            }else{
              arr = arr.filter(x=>x !== excV);
            }
          }
          if(arr.includes(v)) arr = arr.filter(x=>x!==v);
          else{ if(arr.length >= max){ this.shake(); return; } arr.push(v); }
          this.state.answers[q.field] = arr;
          this.saveState(); this.rerenderMulti(root); this.renderFooter(step);
        });
      });
    }
    if(q.type === 'scale'){
      root.querySelectorAll('.scale-row').forEach(el=>{
        el.addEventListener('click', ()=>{
          root.querySelectorAll('.scale-row').forEach(o=>o.classList.remove('selected'));
          el.classList.add('selected');
          this.state.answers[q.field] = el.dataset.v;
          this.saveState();
          setTimeout(()=>this.next(), 340);
        });
      });
    }
    if(q.type === 'date')        this.initWheel(root, q);
    if(q.type === 'number-dual') this.initNumDual(root, q, step);
    if(q.type === 'profile-input') this.initProfile(root, q, step);
    if(q.type === 'compound')    this.initCompound(root, q, step);
  },
  rerenderMulti(root){
    const q = STEPS[this.state.currentIdx].question;
    const arr = this.state.answers[q.field] || [];
    root.querySelectorAll('.option').forEach(el=>{
      el.classList.toggle('selected', arr.includes(el.dataset.v));
    });
    const hint = root.querySelector('.multi-hint .count');
    if(hint) hint.textContent = arr.length;

  initNumDual(root, q, step){
    const inputs = root.querySelectorAll('.num-input-field input');
    const update = ()=>{
      const obj = {};
      inputs.forEach(inp=>{
        const k = inp.closest('.num-input-field').dataset.key;
        const v = parseFloat(inp.value);
        if(!isNaN(v)) obj[k] = v;
      });
      this.state.answers[q.field] = obj;
      this.saveState(); this.renderFooter(step);
    };
    inputs.forEach(inp=> inp.addEventListener('input', update));
    setTimeout(()=>{ inputs[0] && inputs[0].focus(); }, 400);
  },
  initProfile(root, q, step){
    const fields = root.querySelectorAll('.profile-input-field');
    const hint = root.querySelector('#profileHint');
    const update = ()=>{
      const obj = {};
      fields.forEach(fEl=>{
        const k = fEl.dataset.key;
        const inp = fEl.querySelector('input');
        let v = inp.value;
        if(k === 'PHONE') v = v.replace(/\D/g, '').slice(0, 11);
        if(inp.value !== v) inp.value = v;
        obj[k] = v.trim();
      });
      // 顶层存一份，方便上传时直接取
      this.state.answers[q.field] = obj;
      this.state.answers.NAME = obj.NAME || '';
      this.state.answers.PHONE = obj.PHONE || '';
      this.state.answers.CITY = obj.CITY || '';
      // 实时校验提示（仅在所有字段都失焦或填到完整长度时展示错误）
      const phoneOk = /^1[3-9]\d{9}$/.test(obj.PHONE || '');
      const phoneEl = root.querySelector('.profile-input-field[data-key="PHONE"]');
      if(obj.PHONE && obj.PHONE.length === 11 && !phoneOk){
        phoneEl.classList.add('error');
        if(hint) hint.innerHTML = '<span class="err">手机号格式不正确，请检查</span>';
      }else{
        phoneEl.classList.remove('error');
        if(hint) hint.textContent = '';
      }
      this.saveState();
      this.renderFooter(step);
    };
    fields.forEach(fEl=>{
      const inp = fEl.querySelector('input');
      inp.addEventListener('input', update);
      inp.addEventListener('blur', update);
    });
    setTimeout(()=>{ fields[0] && fields[0].querySelector('input').focus(); }, 400);
  },
  initWheel(root, q){
    const yCol = root.querySelector('#wheelY');
    const mCol = root.querySelector('#wheelM');
    const updateActive = (col)=>{
      const items = col.querySelectorAll('.wheel-item');
      const colRect = col.getBoundingClientRect();
      const center = colRect.top + colRect.height/2;
      let nearest=null,minD=Infinity;
      items.forEach(it=>{
        const r = it.getBoundingClientRect();
        const d = Math.abs((r.top+r.height/2) - center);
        if(d<minD){minD=d;nearest=it}
      });
      items.forEach(it=>it.classList.toggle('active', it===nearest));
      return nearest ? nearest.dataset.v : null;
    };
    const saveDate = ()=>{
      const y = parseInt(updateActive(yCol));
      const m = parseInt(updateActive(mCol));
      if(y && m){
        this.state.answers[q.field] = {y, m};
        this.saveState();
        this.renderFooter(STEPS[this.state.currentIdx]);
      }
    };
    requestAnimationFrame(()=>{
      const curY = parseInt(yCol.dataset.cur);
      const curM = parseInt(mCol.dataset.cur);
      const yTarget = yCol.querySelector(`[data-v="${curY}"]`);
      const mTarget = mCol.querySelector(`[data-v="${curM}"]`);
      if(yTarget) yCol.scrollTop = yTarget.offsetTop - 80;
      if(mTarget) mCol.scrollTop = mTarget.offsetTop - 80;
      setTimeout(saveDate, 100);
    });
    let yTimer,mTimer;
    yCol.addEventListener('scroll', ()=>{clearTimeout(yTimer); yTimer=setTimeout(saveDate,80); updateActive(yCol)});
    mCol.addEventListener('scroll', ()=>{clearTimeout(mTimer); mTimer=setTimeout(saveDate,80); updateActive(mCol)});
  },
  initCompound(root, q, step){
    root.querySelectorAll('.main-opt').forEach(el=>{
      el.addEventListener('click', ()=>{
        root.querySelectorAll('.main-opt').forEach(o=>o.classList.remove('selected'));
        el.classList.add('selected');
        this.state.answers[q.main.field] = el.dataset.v;
        this.saveState();
        const screen = root.closest('.screen');
        screen.querySelector('.q-body').innerHTML = this.tplCompound(q);
        this.bindQuestion(step, screen);
        this.renderFooter(step);
      });
    });
    const subF = q.sub.field; const subExc = q.sub.exclusiveValue;
    root.querySelectorAll('.sub-opt').forEach(el=>{
      el.addEventListener('click', ()=>{
        const v = el.dataset.v;
        let arr = this.state.answers[subF] ? [...this.state.answers[subF]] : [];
        let triggerNext = false;
        if(subExc){
          if(v === subExc){
            const wasSelected = arr.includes(subExc);
            arr = wasSelected ? [] : [subExc];
            // 选中（而非取消）排他选项时，自动进入下一题
            if(!wasSelected) triggerNext = true;
          }
          else{
            arr = arr.filter(x=>x!==subExc);
            if(arr.includes(v)) arr = arr.filter(x=>x!==v);
            else arr.push(v);
          }
        }else{
          if(arr.includes(v)) arr = arr.filter(x=>x!==v);
          else arr.push(v);
        }
        this.state.answers[subF] = arr;
        this.saveState();
        root.querySelectorAll('.sub-opt').forEach(o=>{
          o.classList.toggle('selected', arr.includes(o.dataset.v));
        });
        const hint = root.querySelector('.multi-hint .count');
        if(hint) hint.textContent = arr.length;
        this.renderFooter(step);
        if(triggerNext){
          setTimeout(()=>this.next(), 320);
        }
      });
    });
  },

  isAnswered(q, step){
    const v = this.state.answers[q.field];
    if(q.type === 'single' || q.type === 'scale') return !!v;
    if(q.type === 'multi') return Array.isArray(v) && v.length>0;
    if(q.type === 'date')  return v && v.y && v.m;
    if(q.type === 'number-dual'){
      if(!v) return false;
      return q.fields.every(f=>{ const x = v[f.key]; return x && x >= f.min && x <= f.max; });
    }
    if(q.type === 'profile-input'){
      if(!v) return false;
      const name = (v.NAME || '').trim();
      const phone = (v.PHONE || '').trim();
      const city = (v.CITY || '').trim();
      if(name.length < 2) return false;
      if(!/^1[3-9]\d{9}$/.test(phone)) return false;
      if(city.length < 1) return false;
      return true;
    }
    if(q.type === 'compound'){
      const mainV = this.state.answers[q.main.field];
      if(!mainV) return false;
      const subShow = q.sub.showIf ? q.sub.showIf(this.state.answers) : true;
      if(subShow){
        const subV = this.state.answers[q.sub.field];
        return Array.isArray(subV) && subV.length>0;
      }
      return true;
    }
    return false;
  },

<script>
// 腾讯云云开发数据上报（通过云函数 notify-new-survey 中转：写库 + 企业微信群通知）
const CLOUDBASE_UPLOADED_KEY = 'fhp_cloudbase_uploaded_v1';
const ENV_ID = 'yuecheng-survey-d4fucklsf6b68aaf';
const CLOUD_FUNCTION = 'notify-new-survey';

async function initCloudBase() {
  try {
    if (typeof cloudbase === 'undefined') return null;
    const app = cloudbase.init({ env: ENV_ID });
    await app.auth().signInAnonymously();
    return app;
  } catch(e) {
    console.error('CloudBase init failed', e);
    return null;
  }
}

async function uploadSurveyData(answers, branch, branchName, age, tags, alertInfo, filledCount) {
  try {
    // 防重复上报：24小时内同一浏览器不再上报
    const last = localStorage.getItem(CLOUDBASE_UPLOADED_KEY);
    if (last) {
      const hours = (Date.now() - parseInt(last)) / (1000 * 60 * 60);
      if (hours < 24) {
        console.log('CloudBase: already uploaded within 24h');
        return;
      }
    }

    const app = await initCloudBase();
    if (!app) return;

    // 调用云函数 notify-new-survey：云函数内部会写数据库 + 调用企业微信 webhook 发群通知
    const result = await app.callFunction({
      name: CLOUD_FUNCTION,
      data: {
        brand:'fanghuapu',brandLabel:'芳华谱·女性首诊',answers: answers,
        branch: branch,
        branchName: branchName,
        age: age,
        tags: tags,
        alert: alertInfo,
        filledCount: filledCount,
        contact: {
          name: (answers && answers.NAME) || '',
          phone: (answers && answers.PHONE) || '',
          city: (answers && answers.CITY) || ''
        },
        userAgent: navigator.userAgent,
        screenWidth: window.innerWidth,
        timestamp: Date.now()
      }
    });

    const ret = (result && result.result) || {};
    console.log('Survey: upload + notify success', ret);

    localStorage.setItem(CLOUDBASE_UPLOADED_KEY, Date.now().toString());
    // 本地用户已完成 +1（下次访问欢迎页时显示+1）
    try{
      const cnt = parseInt(localStorage.getItem('fhp_user_submitted') || '0', 10);
      localStorage.setItem('fhp_user_submitted', String((isNaN(cnt)?0:cnt) + 1));
    }catch(e){}
  } catch(e) {
    console.error('Cloud function call failed', e);
  }
}
</script>

  {id:'D1',type:'question',section:'D 段·六维快筛',question:{field:'CV',type:'multi',title:'心血管与代谢',desc:'近半年您出现过哪些？',maxSelect:7,exclusiveValue:'⑦',options:[{v:'①',label:'午后明显疲倦/能量崩塌'},{v:'②',label:'手脚冰凉'},{v:'③',label:'偶尔胸闷或心慌'},{v:'④',label:'血压波动'},{v:'⑤',label:'餐后嗜睡或血糖波动感'},{v:'⑥',label:'水肿（脸/腿/手）'},{v:'⑦',label:'都没有'}],mechanism:'心血管与代谢系统是衰老十四大特征中「线粒体功能障碍」「营养感应失调」「细胞间通讯改变」的核心载体（Cell, 2023）。'}},
  {id:'D2',type:'question',section:'D 段·六维快筛',question:{field:'RH',type:'multi',title:'激素与生殖',desc:'近半年您出现过哪些？',maxSelect:7,exclusiveValue:'⑧',dynamicHide:(a)=>['④','⑦','③'].includes(a.MENO)?['①','②','③']:[],options:[{v:'①',label:'月经周期变化'},{v:'②',label:'经量异常'},{v:'③',label:'经前症状加重'},{v:'④',label:'潮热或夜汗'},{v:'⑤',label:'阴道干涩或性交不适'},{v:'⑥',label:'性欲减退'},{v:'⑦',label:'头发变细或脱发增多'},{v:'⑧',label:'都没有'}],mechanism:'雌激素影响 400 余个靶器官，是女性衰老的中枢调控因子；围绝经期是衰老急转期（Critical Window）的关键窗口期。'}},
  {id:'D3',type:'question',section:'D 段·六维快筛',question:{field:'GUT',type:'multi',title:'肠道与免疫',desc:'近半年您出现过哪些？',maxSelect:7,exclusiveValue:'⑦',options:[{v:'①',label:'便秘或腹泻（每周 ≥ 2 次）'},{v:'②',label:'腹胀腹气频繁'},{v:'③',label:'食物耐受变差（乳制品/麸质/某些蔬果）'},{v:'④',label:'易感冒（每年 ≥ 3 次）'},{v:'⑤',label:'过敏反复（鼻炎/皮疹/食物）'},{v:'⑥',label:'口腔溃疡反复'},{v:'⑦',label:'都没有'}],mechanism:'肠道菌群失衡是衰老十四大特征之一「微生物群失调」的核心维度，与免疫炎症（Inflammaging）、神经退行、代谢健康深度耦合。'}},
  {id:'D4',type:'question',section:'D 段·六维快筛',question:{field:'BR',type:'multi',title:'神经与肌骨',desc:'近半年您出现过哪些？',maxSelect:7,exclusiveValue:'⑦',options:[{v:'①',label:'入睡困难或夜间易醒（每周 ≥ 3 天）'},{v:'②',label:'记忆或专注下降'},{v:'③',label:'情绪低落或易怒'},{v:'④',label:'关节响或晨僵'},{v:'⑤',label:'肌肉松弛感或上臂赘肉增多'},{v:'⑥',label:'平衡感下降或腰背疼'},{v:'⑦',label:'都没有'}],mechanism:'脑认知、骨密度、肌肉量是衰老的「三大功能性老化」靶点，直接决定老年期独立生活能力（健康预期寿命 HALE 的核心组成）。'}},

  {id:'D5',type:'question',section:'D 段·六维快筛',question:{field:'VAG',type:'multi',title:'私密健康状况',desc:'近 1 年内您出现过哪些？最多 3 项',maxSelect:3,exclusiveValue:'⑦',options:[{v:'①',label:'反复阴道炎或外阴炎（≥ 2 次/年）'},{v:'②',label:'异常分泌物（颜色/气味/量异常）'},{v:'③',label:'外阴瘙痒或灼热感'},{v:'④',label:'反复尿路感染（≥ 2 次/年）'},{v:'⑤',label:'同房后不适（疼痛/出血/灼热）'},{v:'⑥',label:'因妇科症状使用过抗生素或抗真菌药'},{v:'⑦',label:'都没有'}],mechanism:'女性私密健康与雌激素水平、肠道-阴道菌群轴密切相关，反复感染常是 GSM（绝经泌尿生殖综合征）或菌群失衡的早期信号。'}},

  {id:'B1.4b',type:'question',section:'B1 育龄期评估',showIf:(a)=>a.B1_OVA==='①',question:{field:'B1_OVA_R',type:'single',title:'您的检测结果是否提示卵巢储备下降？',options:[{v:'①',label:'是，明显下降'},{v:'②',label:'是，临界值'},{v:'③',label:'否，正常'},{v:'④',label:'当时正常但现在不确定'}],mechanism:'卵巢储备下降的早期识别为生育规划与激素干预提供 5–10 年的主动窗口。'}},
  {id:'B1.5',type:'question',section:'B1 育龄期评估',question:{field:'B1_FAM',type:'multi',title:'您母亲或姐妹的绝经年龄与妇科风险',maxSelect:5,exclusiveValue:'⑦',options:[{v:'①',label:'< 45 岁绝经'},{v:'②',label:'45–50 岁绝经'},{v:'③',label:'50–55 岁绝经'},{v:'④',label:'> 55 岁绝经'},{v:'⑤',label:'有姐妹卵巢早衰史'},{v:'⑥',label:'自身免疫病家族史'},{v:'⑦',label:'不清楚'}],mechanism:'绝经年龄约 50% 由遗传因素决定，家族中母亲或姐妹的绝经年龄是预测您个人绝经时间的最强单一因子。'}},

  {id:'B1.8',type:'question',section:'B1 育龄期评估',question:{field:'B1_GUT_H',type:'multi',title:'您的肠道与抗生素相关史',desc:'最多 3 项',maxSelect:3,exclusiveValue:'⑦',options:[{v:'①',label:'反复肠易激或慢性腹泻'},{v:'②',label:'近 2 年使用过 ≥ 3 次抗生素疗程'},{v:'③',label:'长期或反复使用抗酸药（PPI/H2RA）'},{v:'④',label:'饮食偏好高糖或精加工食品'},{v:'⑤',label:'长期服用益生菌或益生元'},{v:'⑥',label:'经常摄入发酵食物（酸奶/泡菜/纳豆等）'},{v:'⑦',label:'都没有'}],mechanism:'抗生素累积暴露与肠道菌群多样性下降直接相关；长期 PPI 抑酸药使用与维生素 B12、镁、钙吸收下降相关。'}},
  {id:'B2.1',type:'question',section:'B2 围产期评估',question:{field:'B2_STAGE',type:'single',title:'您目前所处的阶段',options:[{v:'①',label:'孕中（孕 12 周后）'},{v:'②',label:'产后 0–3 个月'},{v:'③',label:'产后 3–6 个月'},{v:'④',label:'产后 6–12 个月'},{v:'⑤',label:'产后 12–24 个月'}],mechanism:'围产期是女性激素剧烈波动期，产后 24 个月内是代谢、激素、骨盆底、心理系统的核心重塑窗口。'}},
  {id:'B2.2',type:'question',section:'B2 围产期评估',skipIf:(a)=>a.B2_STAGE==='①',skipValue:'⑤',question:{field:'B2_DELIV',type:'single',title:'您本胎的分娩方式',options:[{v:'①',label:'顺产'},{v:'②',label:'顺产侧切'},{v:'③',label:'剖宫产'},{v:'④',label:'顺转剖'},{v:'⑤',label:'尚未分娩'}],mechanism:'分娩方式对盆底肌、腹直肌、产道菌群及新生儿肠道菌群定植均有显著影响。'}},
  {id:'B2.3',type:'question',section:'B2 围产期评估',skipIf:(a)=>a.B2_STAGE==='①',skipValue:'⑤',question:{field:'B2_WT_R',type:'single',title:'与孕前相比，您的体重恢复情况',options:[{v:'①',label:'已恢复到孕前'},{v:'②',label:'比孕前重 < 5kg'},{v:'③',label:'比孕前重 5–10kg'},{v:'④',label:'比孕前重 > 10kg'},{v:'⑤',label:'尚未分娩'}],mechanism:'产后体重滞留 > 5kg 与远期 2 型糖尿病、心血管事件风险增加 1.5–2 倍相关（Nurses\' Health Study）。'}},
  {id:'B2.4',type:'question',section:'B2 围产期评估',question:{field:'B2_MOOD',type:'single',title:'您近 2 周的情绪状态',desc:'是否经常出现：感觉低落、沮丧或绝望感，或对做事缺乏兴趣？',options:[{v:'①',label:'几乎每天'},{v:'②',label:'一半以上天数'},{v:'③',label:'有几天'},{v:'④',label:'完全没有'},{v:'⑤',label:'尚未分娩'}],mechanism:'本题改编自 PHQ-2 抑郁筛查问卷条目，产后抑郁发生率 10–20%，早期识别与干预可大幅改善母婴长期预后。'}},

  {id:'B2.6',type:'question',section:'B2 围产期评估',skipIf:(a)=>a.B2_STAGE==='①',skipValue:['⑥'],question:{field:'B2_SKIN',type:'multi',title:'与孕前相比，您皮肤与头发的变化',desc:'最多 3 项',maxSelect:3,exclusiveValue:'⑤',options:[{v:'①',label:'大量脱发'},{v:'②',label:'妊娠纹明显'},{v:'③',label:'黄褐斑或色素沉着'},{v:'④',label:'皮肤松弛、暗沉'},{v:'⑤',label:'没有明显变化'},{v:'⑥',label:'尚未分娩'}],mechanism:'产后脱发（休止期脱发）与雌激素骤降相关，妊娠纹源于皮肤胶原网络损伤，黄褐斑与雌激素-MSH 轴相关。'}},
  {id:'B2.7',type:'question',section:'B2 围产期评估',skipIf:(a)=>a.B2_STAGE==='①',skipValue:'⑤',question:{field:'B2_FEED',type:'single',title:'您目前的哺乳状态',options:[{v:'①',label:'纯母乳'},{v:'②',label:'混合喂养'},{v:'③',label:'已断奶'},{v:'④',label:'未哺乳'},{v:'⑤',label:'尚未分娩'}],mechanism:'母乳喂养每日额外消耗约 500–700 千卡，对营养素需求高于孕期，铁、钙、维生素 D、Omega-3 是核心关注点。'}},
  {id:'B2.8',type:'question',section:'B2 围产期评估',question:{field:'B2_VAG',type:'multi',title:'您孕期或产后的阴道与泌尿系统健康',desc:'最多 3 项',maxSelect:3,exclusiveValue:'⑦',options:[{v:'①',label:'孕期反复阴道炎'},{v:'②',label:'孕期反复尿路感染'},{v:'③',label:'产后阴道恢复不理想（松弛/干涩/异味）'},{v:'④',label:'产后反复尿路感染'},{v:'⑤',label:'产后异常分泌物'},{v:'⑥',label:'尚未分娩'},{v:'⑦',label:'都没有'}],mechanism:'孕产期免疫调整与激素变化使阴道菌群、泌尿系统更易出现失衡，反复感染需特别关注产后菌群恢复。'}},
  {id:'B3.1',type:'question',section:'B3 生育后修复',question:{field:'B3_DECL',type:'single',title:'您是否感觉最近 2–3 年身体开始「走下坡路」',options:[{v:'①',label:'是，非常明显'},{v:'②',label:'是，比较明显'},{v:'③',label:'偶尔有感觉'},{v:'④',label:'没有这种感觉'}],mechanism:'「主观衰老转折点」常出现在 35–45 岁，是雌激素轴、线粒体功能、骨骼肌量同步开始衰减的整合感受。'}},
  {id:'B3.2',type:'question',section:'B3 生育后修复',question:{field:'B3_CYCLE',type:'multi',title:'您的月经周期是否开始出现变化',desc:'最多 2 项',maxSelect:2,exclusiveValue:'⑥',options:[{v:'①',label:'周期变短（间隔 < 25 天）'},{v:'②',label:'周期变长（间隔 > 32 天）'},{v:'③',label:'周期不规律'},{v:'④',label:'经量明显变少'},{v:'⑤',label:'经前症状加重'},{v:'⑥',label:'没有明显变化'}],mechanism:'卵巢功能衰减的最早期信号是黄体期缩短，可能在 5–10 年内逐渐发展为典型围绝经期表现。'}},

  tplBranchTransition(){const br=computeBranch(this.state.answers),info=BRANCH_INFO[br];return`<div class="transition-screen stagger"><div class="transition-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg></div><div class="sys-label" style="margin-bottom:12px">${info.en}</div><h2 class="transition-title">${info.name}</h2><p class="transition-sub">${info.desc}</p><div class="transition-tag"><svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>为您匹配个性化评估路径</div></div>`;},
  tplQuestion(step){const q=step.question;let body='';if(q.type==='single')body=this.tplSingle(q);else if(q.type==='multi')body=this.tplMulti(q);else if(q.type==='scale')body=this.tplScale(q);else if(q.type==='date')body=this.tplDate(q);else if(q.type==='number-dual')body=this.tplNumDual(q);else if(q.type==='profile-input')body=this.tplProfile(q);else if(q.type==='compound')body=this.tplCompound(q);return`<div class="q-head stagger"><div class="q-meta"><span class="seg">${step.section||''}</span><span class="dot"></span><span class="num">${step.id}</span></div><h2 class="q-title">${q.title}</h2>${q.desc?`<p class="q-desc">${q.desc}</p>`:''}${q.mechanism?`<p class="q-note">${q.mechanism}</p>`:''}</div><div class="q-body">${body}</div>`;},
  tplSingle(q){const c=this.state.answers[q.field];return`<div class="options">${q.options.map(o=>`<div class="option ${c===o.v?'selected':''}" data-v="${o.v}"><div class="option-idx">${o.v}</div><div class="option-label">${o.label}</div><div class="check"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></div></div>`).join('')}</div>`;},
  tplMulti(q){const c=this.state.answers[q.field]||[],max=q.maxSelect||99;let hv=q.dynamicHide?(q.dynamicHide(this.state.answers)||[]):[];const vo=q.options.filter(o=>!hv.includes(o.v));return`<div class="options">${vo.map(o=>`<div class="option ${c.includes(o.v)?'selected':''}" data-v="${o.v}"><div class="option-idx">${o.v}</div><div class="option-label">${o.label}</div><div class="check"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></div></div>`).join('')}</div><div class="multi-hint">已选 <span class="count">${c.length}</span> 项${q.maxSelect&&q.maxSelect<10?` · 最多 ${max} 项`:''}</div>`;},
  tplScale(q){const c=this.state.answers[q.field],total=q.options.length;return`<div class="scale-options">${q.options.map((o,i)=>{const w=((i+1)/total)*100;return`<div class="scale-row ${c===o.v?'selected':''}" data-v="${o.v}"><div class="scale-dot">${o.v}</div><div class="scale-text">${o.label}</div><div class="scale-bar"><div class="scale-bar-fill" style="width:${w}%"></div></div></div>`;}).join('')}</div>`;},
  tplDate(q){const c=this.state.answers[q.field]||{y:1990,m:6};const years=[];const ny=new Date().getFullYear();for(let y=ny-70;y<=ny-15;y++)years.push(y);const months=[];for(let m=1;m<=12;m++)months.push(m);return`<div class="wheel-picker" data-field="${q.field}"><div class="selector"></div><div class="wheel-col" id="wheelY" data-cur="${c.y}"><div class="wheel-pad"></div>${years.map(y=>`<div class="wheel-item" data-v="${y}">${y} 年</div>`).join('')}<div class="wheel-pad"></div></div><div class="wheel-col" id="wheelM" data-cur="${c.m}"><div class="wheel-pad"></div>${months.map(m=>`<div class="wheel-item" data-v="${m}">${String(m).padStart(2,'0')} 月</div>`).join('')}<div class="wheel-pad"></div></div></div>`;},
  tplNumDual(q){const c=this.state.answers[q.field]||{};return`<div class="num-input-group">${q.fields.map(f=>`<div class="num-input-field" data-key="${f.key}"><span class="lbl">${f.label}</span><input type="number" inputmode="decimal" placeholder="${f.placeholder}" min="${f.min}" max="${f.max}" value="${c[f.key]||''}"><span class="unit">${f.unit}</span></div>`).join('')}</div>`;},
  tplProfile(q){const c=this.state.answers[q.field]||{};return`<div class="profile-input-group">${q.fields.map(f=>`<div class="profile-input-field" data-key="${f.key}"><span class="lbl">${f.label}</span><input type="${f.type}" inputmode="${f.type==='tel'?'tel':'text'}" maxlength="${f.type==='tel'?11:30}" placeholder="${f.placeholder}" autocomplete="${f.autocomplete||'off'}" value="${c[f.key]||''}"></div>`).join('')}<div class="profile-hint" id="profileHint"></div></div>`;},
  tplCompound(q){const a=this.state.answers,mv=a[q.main.field],ss=q.sub.showIf?q.sub.showIf(a):true;const mh=`<div class="compound-block first"><div class="sub-label">${q.main.label}</div><div class="options">${q.main.options.map(o=>`<div class="option main-opt ${mv===o.v?'selected':''}" data-v="${o.v}"><div class="option-idx">${o.v}</div><div class="option-label">${o.label}</div><div class="check"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></div></div>`).join('')}</div></div>`;let sh='';if(ss){const sv=a[q.sub.field]||[];sh=`<div class="compound-block"><div class="sub-label">${q.sub.label}</div><div class="options">${q.sub.options.map(o=>`<div class="option sub-opt ${sv.includes(o.v)?'selected':''}" data-v="${o.v}"><div class="option-idx">${o.v}</div><div class="option-label">${o.label}</div><div class="check"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></div></div>`).join('')}</div><div class="multi-hint">已选 <span class="count">${sv.length}</span> 项</div></div>`;}return mh+sh;},
  bindQuestion(step,root){
    const q=step.question;
    if(q.type==='single'){root.querySelectorAll('.option').forEach(el=>{el.addEventListener('click',()=>{root.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));el.classList.add('selected');this.state.answers[q.field]=el.dataset.v;this.saveState();setTimeout(()=>this.next(),310);});});}
    if(q.type==='multi'){const max=q.maxSelect||99,excV=q.exclusiveValue;root.querySelectorAll('.option').forEach(el=>{el.addEventListener('click',()=>{const v=el.dataset.v;let arr=this.state.answers[q.field]?[...this.state.answers[q.field]]:[];if(excV){if(v===excV){const was=arr.includes(excV);arr=was?[]:[excV];this.state.answers[q.field]=arr;this.saveState();this.rerenderMulti(root);this.renderFooter(step);if(!was)setTimeout(()=>this.next(),310);return;}else arr=arr.filter(x=>x!==excV);}if(arr.includes(v))arr=arr.filter(x=>x!==v);else{if(arr.length>=max){this.shake();return;}arr.push(v);}this.state.answers[q.field]=arr;this.saveState();this.rerenderMulti(root);this.renderFooter(step);});});}
    if(q.type==='scale'){root.querySelectorAll('.scale-row').forEach(el=>{el.addEventListener('click',()=>{root.querySelectorAll('.scale-row').forEach(o=>o.classList.remove('selected'));el.classList.add('selected');this.state.answers[q.field]=el.dataset.v;this.saveState();setTimeout(()=>this.next(),330);});});}
    if(q.type==='date')this.initWheel(root,q);
    if(q.type==='number-dual')this.initNumDual(root,q,step);
    if(q.type==='profile-input')this.initProfile(root,q,step);
    if(q.type==='compound')this.initCompound(root,q,step);

  rerenderMulti(root){const q=STEPS[this.state.currentIdx].question,arr=this.state.answers[q.field]||[];root.querySelectorAll('.option').forEach(el=>{el.classList.toggle('selected',arr.includes(el.dataset.v));});const h=root.querySelector('.multi-hint .count');if(h)h.textContent=arr.length;},
  initNumDual(root,q,step){const inputs=root.querySelectorAll('.num-input-field input');const u=()=>{const obj={};inputs.forEach(inp=>{const k=inp.closest('.num-input-field').dataset.key,v=parseFloat(inp.value);if(!isNaN(v))obj[k]=v;});this.state.answers[q.field]=obj;this.saveState();this.renderFooter(step);};inputs.forEach(inp=>inp.addEventListener('input',u));setTimeout(()=>{inputs[0]&&inputs[0].focus();},400);},
  initProfile(root,q,step){const fields=root.querySelectorAll('.profile-input-field'),hint=root.querySelector('#profileHint');const u=()=>{const obj={};fields.forEach(fEl=>{const k=fEl.dataset.key,inp=fEl.querySelector('input');let v=inp.value;if(k==='PHONE')v=v.replace(/\D/g,'').slice(0,11);if(inp.value!==v)inp.value=v;obj[k]=v.trim();});this.state.answers[q.field]=obj;this.state.answers.NAME=obj.NAME||'';this.state.answers.PHONE=obj.PHONE||'';this.state.answers.CITY=obj.CITY||'';const ok=/^1[3-9]\d{9}$/.test(obj.PHONE||''),pe=root.querySelector('.profile-input-field[data-key="PHONE"]');if(obj.PHONE&&obj.PHONE.length===11&&!ok){pe.classList.add('error');if(hint)hint.innerHTML='<span class="err">手机号格式不正确，请检查</span>';}else{pe.classList.remove('error');if(hint)hint.textContent='';}this.saveState();this.renderFooter(step);};fields.forEach(fEl=>{const inp=fEl.querySelector('input');inp.addEventListener('input',u);inp.addEventListener('blur',u);});setTimeout(()=>{fields[0]&&fields[0].querySelector('input').focus();},400);},
  initWheel(root,q){const yCol=root.querySelector('#wheelY'),mCol=root.querySelector('#wheelM');const ua=(col)=>{const items=col.querySelectorAll('.wheel-item'),cr=col.getBoundingClientRect(),center=cr.top+cr.height/2;let nearest=null,minD=Infinity;items.forEach(it=>{const r=it.getBoundingClientRect(),d=Math.abs((r.top+r.height/2)-center);if(d<minD){minD=d;nearest=it;}});items.forEach(it=>it.classList.toggle('active',it===nearest));return nearest?nearest.dataset.v:null;};const sd=()=>{const y=parseInt(ua(yCol)),m=parseInt(ua(mCol));if(y&&m){this.state.answers[q.field]={y,m};this.saveState();this.renderFooter(STEPS[this.state.currentIdx]);}};requestAnimationFrame(()=>{const cy=parseInt(yCol.dataset.cur),cm=parseInt(mCol.dataset.cur),yt=yCol.querySelector(`[data-v="${cy}"]`),mt=mCol.querySelector(`[data-v="${cm}"]`);if(yt)yCol.scrollTop=yt.offsetTop-80;if(mt)mCol.scrollTop=mt.offsetTop-80;setTimeout(sd,100);});let yt2,mt2;yCol.addEventListener('scroll',()=>{clearTimeout(yt2);yt2=setTimeout(sd,80);ua(yCol);});mCol.addEventListener('scroll',()=>{clearTimeout(mt2);mt2=setTimeout(sd,80);ua(mCol);});},
  initCompound(root,q,step){root.querySelectorAll('.main-opt').forEach(el=>{el.addEventListener('click',()=>{root.querySelectorAll('.main-opt').forEach(o=>o.classList.remove('selected'));el.classList.add('selected');this.state.answers[q.main.field]=el.dataset.v;this.saveState();const sc=root.closest('.screen');sc.querySelector('.q-body').innerHTML=this.tplCompound(q);this.bindQuestion(step,sc);this.renderFooter(step);});});const sf=q.sub.field,se=q.sub.exclusiveValue;root.querySelectorAll('.sub-opt').forEach(el=>{el.addEventListener('click',()=>{const v=el.dataset.v;let arr=this.state.answers[sf]?[...this.state.answers[sf]]:[];let tn=false;if(se){if(v===se){const was=arr.includes(se);arr=was?[]:[se];if(!was)tn=true;}else{arr=arr.filter(x=>x!==se);if(arr.includes(v))arr=arr.filter(x=>x!==v);else arr.push(v);}}else{if(arr.includes(v))arr=arr.filter(x=>x!==v);else arr.push(v);}this.state.answers[sf]=arr;this.saveState();root.querySelectorAll('.sub-opt').forEach(o=>o.classList.toggle('selected',arr.includes(o.dataset.v)));const h=root.querySelector('.multi-hint .count');if(h)h.textContent=arr.length;this.renderFooter(step);if(tn)setTimeout(()=>this.next(),310);});});},
  isAnswered(q,step){const v=this.state.answers[q.field];if(q.type==='single'||q.type==='scale')return!!v;if(q.type==='multi')return Array.isArray(v)&&v.length>0;if(q.type==='date')return v&&v.y&&v.m;if(q.type==='number-dual'){if(!v)return false;return q.fields.every(f=>{const x=v[f.key];return x&&x>=f.min&&x<=f.max;});}if(q.type==='profile-input'){if(!v)return false;const nm=(v.NAME||'').trim(),ph=(v.PHONE||'').trim(),ct=(v.CITY||'').trim();if(nm.length<2)return false;if(!/^1[3-9]\d{9}$/.test(ph))return false;if(ct.length<1)return false;return true;}if(q.type==='compound'){const mv=this.state.answers[q.main.field];if(!mv)return false;const ss=q.sub.showIf?q.sub.showIf(this.state.answers):true;if(ss){const sv=this.state.answers[q.sub.field];return Array.isArray(sv)&&sv.length>0;}return true;}return false;},

  return`<div style="padding:32px 24px" class="stagger"><div class="sys-label" style="text-align:left;margin-bottom:10px">评估已完成</div><h1 style="font-size:26px;font-weight:700;letter-spacing:-.4px;margin:0 0 10px">感谢您的认真填写</h1><p style="font-size:14px;color:var(--t2);line-height:1.7;margin:0">您的回答已记录。医师将结合您的体检报告生成专属解读，预计 <strong style="color:var(--primary)">3 个工作日内</strong>由咨询师与您联系。</p>${alert?`<div class="clinic-alert ${alert.level==='S'?'s-level':'high-level'}"><span class="alert-tag">${alert.tag}</span><h3 class="alert-title">${alert.title}</h3><p class="alert-desc">${alert.desc}</p></div>`:''}<div class="feedback-card"><div class="sys-label" style="text-align:left;color:var(--gold);margin-bottom:8px">YOUR PROFILE</div><h3 style="margin:0 0 4px;font-size:16px;font-weight:700">个性化评估路径</h3><p style="font-size:12px;color:var(--t3);margin:0 0 2px">${info.name} · ${fc} 项数据已采集</p><div class="six-dim-grid">${dims.map(d=>`<div class="dim-cell"><div class="dim-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24">${d.s}</svg></div><div class="dim-name">${d.n}</div><div class="dim-en">${d.e}</div></div>`).join('')}</div></div><div class="feedback-card"><div class="sys-label" style="text-align:left;color:var(--gold);margin-bottom:8px">NEXT STEPS</div><h3 style="margin:0;font-size:16px;font-weight:700">接下来</h3><div class="timeline"><div class="timeline-item"><div class="timeline-dot done"></div><div class="timeline-content"><h5>问卷数据已加密提交</h5><p>${fc} 项结构化数据 · 已进入您的专属档案</p></div></div><div class="timeline-item"><div class="timeline-dot"></div><div class="timeline-content"><h5>医师正在整合您的体检报告</h5><p>多组学数据与主观觉察交叉分析</p></div></div><div class="timeline-item"><div class="timeline-dot"></div><div class="timeline-content"><h5>咨询师将与您联系</h5><p>${alert&&alert.level==='S'?'24 小时内':(alert?'48 小时内':'3 个工作日内')} · 安排面诊或电话沟通</p></div></div><div class="timeline-item"><div class="timeline-dot"></div><div class="timeline-content"><h5>妇科专业医师面诊</h5><p>由长寿医学医师团队出具个性化健康管理方案</p></div></div></   uploadToCloud(){const a=this.state.answers,br=computeBranch(a),info=BRANCH_INFO[br],tags=computeTags(a),alert=computeClinicAlert(a,tags);const fc=Object.keys(a).filter(k=>{if(['NAME','PHONE','CITY','PROFILE'].includes(k))return false;const v=a[k];if(v==null)return false;if(Array.isArray(v))return v.length>0;if(typeof v==='object')return Object.keys(v).length>0;return v!=='';}).length;uploadSurveyData(a,br,info?info.name:'',computeAge(a.BIRTH),tags,alert,fc);},

  shareToFriend(){const url=window.location.href.split('?')[0].split('#')[0];const text='我刚完成了一份长寿医学首诊评估，分享给你试试。';if(navigator.share){navigator.share({title:'芳华谱 · 女性健康寿命首诊评估',text,url}).catch(()=>{});return;}const ft=text+' '+url;if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(ft).then(()=>this.showToast('链接已复制 · 可粘贴到微信发给闺蜜')).catch(()=>this.fbCopy(ft));}else this.fbCopy(ft);},
  fbCopy(text){try{const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);this.showToast('链接已复制');}catch(e){window.prompt('请复制以下链接：',text);}},
  showToast(msg){document.querySelectorAll('.toast').forEach(t=>t.remove());const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);requestAnimationFrame(()=>t.classList.add('show'));setTimeout(()=>t.classList.remove('show'),2600);setTimeout(()=>t.remove(),3000);},
  viewSummary(){const a=this.state.answers,tags=computeTags(a);const lines=['【评估摘要】','年龄: '+computeAge(a.BIRTH)+' 岁','分流: '+computeBranch(a)+' · '+BRANCH_INFO[computeBranch(a)].name,'命中标签 ('+tags.length+'):'].concat(tags.map(t=>'· ['+t.level.toUpperCase()+'] '+t.name));alert(lines.join('\n'));},
  openExitModal(){document.getElementById('exitModal').classList.add('show');},
  closeExitModal(){document.getElementById('exitModal').classList.remove('show');},
  exitConfirm(){this.saveState();this.closeExitModal();alert('您的进度已保存，可随时回到本链接继续。');},
};
document.addEventListener('DOMContentLoaded',()=>App.init());
</script>
<script src="https://static.cloudbase.net/cloudbase-js-sdk/2.17.3/cloudbase.full.js"></script>
<script>
const CLOUDBASE_UPLOADED_KEY='fhp_cloudbase_uploaded_v1';
const ENV_ID='yuecheng-survey-d4fucklsf6b68aaf';
const CLOUD_FUNCTION='notify-new-survey';
async function initCloudBase(){try{if(typeof cloudbase==='undefined')return null;const app=cloudbase.init({env:ENV_ID});await app.auth().signInAnonymously();return app;}catch(e){return null;}}
async function uploadSurveyData(answers,branch,branchName,age,tags,alertInfo,filledCount){
  try{
    const last=localStorage.getItem(CLOUDBASE_UPLOADED_KEY);
    if(last&&(Date.now()-parseInt(last))/(1000*60*60)<24){console.log('already uploaded');return;}
    const app=await initCloudBase();if(!app)return;
    await app.callFunction({name:CLOUD_FUNCTION,data:{brand:'fanghuapu',brandLabel:'芳华谱·女性首诊',answers,branch,branchName,age,tags,alert:alertInfo,filledCount,contact:{name:(answers&&answers.NAME)||'',phone:(answers&&answers.PHONE)||'',city:(answers&&answers.CITY)||''},userAgent:navigator.userAgent,screenWidth:window.innerWidth,timestamp:Date.now()}});
    localStorage.setItem(CLOUDBASE_UPLOADED_KEY,Date.now().toString());
    try{const c=parseInt(localStorage.getItem('fhp_user_submitted')||'0',10);localStorage.setItem('fhp_user_submitted',String((isNaN(c)?0:c)+1));}catch(e){}
  }catch(e){console.error('upload failed',e);}
}
</script>
