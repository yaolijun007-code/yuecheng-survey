<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#F7F5F2">
<meta name="format-detection" content="telephone=no">
<title>抗衰与长寿管理中心 · 精准健康</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{
    --klein:#2B5F75;--klein-deep:#1A3F52;--klein-light:#4A8FAF;
    --klein-glow:rgba(43,95,117,.06);--klein-glow-md:rgba(43,95,117,.10);--klein-glow-sm:rgba(43,95,117,.04);
    --gold:#C4A882;--gold-soft:#D4C4A8;--gold-glow:rgba(196,168,130,.08);
    --t1:#1E293B;--t2:#475569;--t3:#94A3B8;--t4:#CBD5E1;
    --bg:#F7F5F2;--bg-soft:#EDEAE6;--card:rgba(255,253,250,.92);--card-solid:#FFFDFA;
    --line:rgba(30,41,59,.06);--line-md:rgba(30,41,59,.10);--line-strong:rgba(43,95,117,.15);
    --r-sm:14px;--r-md:20px;--r-lg:24px;--r-xl:28px;
    --sh-blue:0 8px 24px rgba(43,95,117,.12),0 2px 6px rgba(43,95,117,.08);
    --ease:cubic-bezier(.22,.61,.36,1);--ease-in:cubic-bezier(.4,0,1,1);
    --safe-t:env(safe-area-inset-top,0);--safe-b:env(safe-area-inset-bottom,0);
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;overscroll-behavior:none;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Helvetica Neue","Microsoft YaHei",sans-serif;font-size:17px;line-height:1.65;color:var(--t1);background:var(--bg);text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;font-feature-settings:"kern","liga","calt"}
  input,textarea{user-select:text;-webkit-user-select:text}
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  .ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .ambient::before,.ambient::after{content:"";position:absolute;border-radius:50%;filter:blur(80px);opacity:.55}
  .ambient::before{width:60vw;height:60vw;top:-20vw;right:-20vw;background:radial-gradient(circle,rgba(43,95,117,.10),transparent 65%)}
  .ambient::after{width:50vw;height:50vw;bottom:-15vw;left:-15vw;background:radial-gradient(circle,rgba(196,168,130,.06),transparent 65%)}
  #app{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;padding-top:var(--safe-t);padding-bottom:var(--safe-b)}
  .topbar{flex-shrink:0;display:flex;align-items:center;gap:14px;padding:10px 18px 14px;min-height:48px}
  .topbar.hide{visibility:hidden}
  .icon-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--t2);transition:background .25s var(--ease),transform .15s var(--ease)}
  .icon-btn:active{background:var(--line);transform:scale(.92)}
  .icon-btn svg{width:18px;height:18px;stroke-width:2}
  .progress{flex:1;height:2px;background:var(--line);border-radius:99px;overflow:hidden;position:relative}
  .progress-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--klein) 0%,var(--klein-light) 100%);border-radius:99px;width:0%;transition:width .6s cubic-bezier(.65,0,.35,1)}
  .progress-fill::after{content:"";position:absolute;right:0;top:0;bottom:0;width:24px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.6));border-radius:99px}
  .progress-label{font-size:11px;color:var(--t3);letter-spacing:.5px;font-variant-numeric:tabular-nums;min-width:38px;text-align:right}
  .main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative}
  .screen{min-height:100%;padding:8px 24px 32px;display:flex;flex-direction:column;animation:screenIn .55s var(--ease) both}
  .screen.leaving{animation:screenOut .25s var(--ease-in) both}
  @keyframes screenIn{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes screenOut{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-6px)}}
  .stagger>*{animation:fadeUp .6s var(--ease) both}
  .stagger>*:nth-child(1){animation-delay:.05s}.stagger>*:nth-child(2){animation-delay:.15s}
  .stagger>*:nth-child(3){animation-delay:.25s}.stagger>*:nth-child(4){animation-delay:.35s}
  .stagger>*:nth-child(5){animation-delay:.45s}.stagger>*:nth-child(6){animation-delay:.55s}
  .stagger>*:nth-child(7){animation-delay:.65s}.stagger>*:nth-child(8){animation-delay:.75s}
  @keyframes fadeUp{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11px;letter-spacing:1.5px;color:var(--gold);text-transform:uppercase;font-weight:500}
  .eyebrow::before{content:"";width:18px;height:1px;background:var(--gold);opacity:.6}
  .h-display{font-size:30px;line-height:1.18;font-weight:600;letter-spacing:-.5px;color:var(--t1)}
  .h-large{font-size:26px;line-height:1.28;font-weight:600;letter-spacing:-.3px;color:var(--t1)}
  .h-medium{font-size:21px;line-height:1.35;font-weight:600;letter-spacing:-.2px;color:var(--t1)}
  .body-md{font-size:15px;line-height:1.62;color:var(--t2)}
  .body-sm{font-size:13px;line-height:1.6;color:var(--t3)}
  .micro{font-size:11px;letter-spacing:.6px;color:var(--t3)}
  .accent{color:var(--klein)}
  .welcome{justify-content:space-between;padding-top:20px}
  .welcome .brand{display:flex;flex-direction:column;align-items:center;margin-top:8px}
  .hero-illustration{width:100%;max-width:240px;height:auto;display:block;margin:0 auto 14px;filter:drop-shadow(0 4px 16px rgba(43,95,117,.08))}
  .hero-illustration svg{width:100%;height:auto;display:block}
  .brand-mark{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--klein) 0%,var(--klein-light) 100%);display:flex;align-items:center;justify-content:center;box-shadow:var(--sh-blue);margin-bottom:24px;position:relative}
  .brand-mark::after{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent 50%)}
  .brand-mark svg{width:32px;height:32px;color:#fff;position:relative;z-index:1}
  .brand-name{font-size:13px;color:var(--t2);letter-spacing:2px;font-weight:400}
  .brand-name .center{color:var(--klein);font-weight:500}
  .welcome-hero{margin-top:32px}
  .welcome-hero .title-cn{font-size:36px;line-height:1.15;font-weight:600;letter-spacing:-.8px;color:var(--t1);margin-bottom:10px}
  .welcome-hero .title-cn .accent{background:linear-gradient(135deg,var(--klein) 0%,var(--klein-light) 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .welcome-hero .title-en{font-size:13px;letter-spacing:3px;color:var(--t3);text-transform:uppercase;font-weight:300;margin-top:14px}
  .welcome-hero .subtitle{margin-top:20px;font-size:16px;line-height:1.7;color:var(--t2);max-width:320px}
  .social-proof{display:flex;align-items:center;gap:10px;margin-top:18px;padding:10px 14px;background:var(--card);border:1px solid var(--line);border-radius:12px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
  .social-proof .avatars{display:flex;padding-left:8px}
  .social-proof .avatars .av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--klein-light),var(--klein-deep));border:2px solid var(--card);margin-left:-10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:600}
  .social-proof p{margin:0;font-size:12px;color:var(--t2);line-height:1.5}
  .value-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px}
  .value-tag{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:99px;background:var(--klein-glow);border:1px solid var(--line-strong);font-size:12px;color:var(--klein);font-weight:500}
  .value-tag svg{width:14px;height:14px}
  @media (max-height:700px){
    .welcome{padding-top:14px}
    .welcome .brand{margin-top:4px}
    .hero-illustration{max-width:180px;margin-bottom:8px}
    .welcome-hero{margin-top:20px}
    .welcome-hero .title-cn{font-size:30px}
    .welcome-hero .subtitle{margin-top:14px;font-size:15px;line-height:1.6}
  }
  @media (max-height:600px){
    .hero-illustration{max-width:140px;margin-bottom:4px}
    .welcome-hero{margin-top:12px}
    .welcome-hero .title-cn{font-size:26px}
    .welcome-hero .title-en{margin-top:8px}
    .welcome-hero .subtitle{margin-top:10px;font-size:14px}
  }
  .meta-row{display:flex;gap:0;margin-top:28px;background:var(--card);backdrop-filter:blur(20px) saturate(1.6);-webkit-backdrop-filter:blur(20px) saturate(1.6);border:1px solid var(--line);border-radius:var(--r-md);padding:18px 4px}
  .meta-item{flex:1;text-align:center;position:relative}
  .meta-item+.meta-item::before{content:"";position:absolute;left:0;top:20%;bottom:20%;width:1px;background:var(--line)}
  .meta-item .num-val{font-size:22px;font-weight:600;color:var(--t1);letter-spacing:-.3px}
  .meta-item .num-val .unit{font-size:12px;color:var(--t3);font-weight:400;margin-left:2px}
  .meta-item .lbl{font-size:11px;color:var(--t3);margin-top:4px;letter-spacing:.5px}
  .intro-list{margin-top:28px;display:flex;flex-direction:column;gap:14px}
  .intro-step{display:flex;gap:14px;align-items:flex-start;padding:16px 16px;background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--line);border-radius:var(--r-md)}
  .intro-step .step-num{flex-shrink:0;width:32px;height:32px;border-radius:50%;background:var(--klein-glow);color:var(--klein);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;border:1px solid var(--line-strong)}
  .intro-step .step-content h4{font-size:15px;font-weight:600;color:var(--t1);margin:4px 0 4px}
  .intro-step .step-content p{font-size:13px;color:var(--t3);margin:0;line-height:1.5}
  .privacy-card{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--line);border-radius:var(--r-lg);padding:24px;margin-top:20px}
  .privacy-list{display:flex;flex-direction:column;gap:14px;margin-top:8px}
  .privacy-item{display:flex;gap:12px;align-items:flex-start}
  .privacy-icon{flex-shrink:0;width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--klein-glow),var(--klein-glow-sm));display:flex;align-items:center;justify-content:center;color:var(--klein)}
  .privacy-icon svg{width:16px;height:16px}
  .privacy-item h4{font-size:14px;font-weight:600;color:var(--t1);margin:4px 0 2px}
  .privacy-item p{font-size:12.5px;color:var(--t3);margin:0;line-height:1.55}
  .q-head{margin-bottom:24px}
  .q-title{font-size:23px;line-height:1.35;font-weight:600;color:var(--t1);letter-spacing:-.2px;margin-top:14px}
  .q-desc{margin-top:10px;font-size:14px;line-height:1.6;color:var(--t3)}
  .options{display:flex;flex-direction:column;gap:10px;margin-top:8px}
  .option{position:relative;background:var(--card);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);border:1.5px solid var(--line);border-radius:var(--r-md);padding:16px 18px;display:flex;align-items:center;gap:14px;transition:all .25s var(--ease);cursor:pointer;min-height:58px}
  .option:active{transform:scale(.985)}
  .option.selected{background:linear-gradient(135deg,var(--klein) 0%,var(--klein-light) 100%);border-color:var(--klein);box-shadow:var(--sh-blue)}
  .option.selected .option-label,.option.selected .option-idx{color:#fff}
  .option.selected .option-idx{background:rgba(255,255,255,.18);border-color:transparent}
  .option.selected .check{opacity:1;transform:scale(1)}
  .option-idx{flex-shrink:0;width:28px;height:28px;border-radius:50%;border:1.5px solid var(--line-md);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--t3);font-weight:500;transition:all .25s var(--ease)}
  .option-label{flex:1;font-size:16px;color:var(--t1);font-weight:400;line-height:1.4;transition:color .25s var(--ease)}
  .check{margin-left:8px;opacity:0;transform:scale(.6);transition:opacity .25s var(--ease),transform .25s var(--ease);color:#fff}
  .check svg{width:18px;height:18px;stroke-width:2.5}
  .multi-hint{margin-top:14px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t3)}
  .multi-hint .count{color:var(--klein);font-weight:500;font-variant-numeric:tabular-nums}
  .num-input-group{display:flex;flex-direction:column;gap:14px;margin-top:8px}
  .num-input-field{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.5px solid var(--line);border-radius:var(--r-md);padding:16px 18px;display:flex;align-items:center;gap:14px;transition:border-color .25s var(--ease)}
  .num-input-field:focus-within{border-color:var(--klein)}
  .num-input-field .lbl{font-size:14px;color:var(--t2);min-width:48px}
  .num-input-field input{flex:1;border:none;outline:none;background:transparent;font-size:22px;font-weight:500;color:var(--t1);font-variant-numeric:tabular-nums;letter-spacing:.5px;text-align:right;padding:0;min-width:0}
  .num-input-field .unit{font-size:14px;color:var(--t3);min-width:28px;text-align:left}
  .contact-group{display:flex;flex-direction:column;gap:14px;margin-top:8px}
  .contact-field{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.5px solid var(--line);border-radius:var(--r-md);padding:14px 18px;transition:border-color .25s var(--ease);position:relative}
  .contact-field:focus-within{border-color:var(--klein)}
  .contact-field .lbl-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t3);margin-bottom:4px;letter-spacing:.3px}
  .contact-field .lbl-row .required{color:var(--klein);font-size:13px;line-height:1}
  .contact-field .lbl-row .optional{color:var(--t4);font-size:10.5px;padding:2px 8px;border-radius:99px;background:var(--bg-soft)}
  .contact-field input{width:100%;border:none;outline:none;background:transparent;font-size:17px;color:var(--t1);padding:2px 0;font-family:inherit}
  .contact-field input::placeholder{color:var(--t4);font-weight:300}
  .contact-tip{margin-top:18px;padding:14px 16px;background:var(--klein-glow-sm);border-radius:14px;border:1px solid var(--line-strong);display:flex;align-items:flex-start;gap:10px}
  .contact-tip svg{flex-shrink:0;width:16px;height:16px;color:var(--klein);margin-top:1px}
  .contact-tip p{margin:0;font-size:12.5px;color:var(--t2);line-height:1.55}
  .contact-field.error{border-color:#E07B5C}
  .contact-field.error .lbl-row{color:#E07B5C}
  .intimacy-note{margin-top:24px;background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--line);border-radius:var(--r-md);padding:20px 22px}
  .intimacy-note p{margin:0;font-size:14.5px;line-height:1.7;color:var(--t2)}
  .intimacy-note p+p{margin-top:10px}
  .intimacy-note .strong{color:var(--t1);font-weight:500}
  .wheel-picker{margin-top:8px;background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.5px solid var(--line);border-radius:var(--r-lg);padding:14px 0;position:relative;display:flex;gap:0;overflow:hidden}
  .wheel-picker::before,.wheel-picker::after{content:"";position:absolute;left:0;right:0;height:62px;pointer-events:none;z-index:2}
  .wheel-picker::before{top:0;background:linear-gradient(180deg,rgba(255,255,255,.95) 0%,rgba(255,255,255,0) 100%)}
  .wheel-picker::after{bottom:0;background:linear-gradient(0deg,rgba(255,255,255,.95) 0%,rgba(255,255,255,0) 100%)}
  .wheel-picker .selector{position:absolute;left:18px;right:18px;top:50%;transform:translateY(-50%);height:42px;border-radius:12px;background:var(--klein-glow);border-top:1px solid var(--line-strong);border-bottom:1px solid var(--line-strong);pointer-events:none;z-index:1}
  .wheel-col{flex:1;height:200px;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;-ms-overflow-style:none;text-align:center;-webkit-overflow-scrolling:touch}
  .wheel-col::-webkit-scrollbar{display:none}
  .wheel-col .wheel-pad{height:80px}
  .wheel-col .wheel-item{height:40px;line-height:40px;font-size:18px;color:var(--t3);scroll-snap-align:center;font-variant-numeric:tabular-nums;letter-spacing:.5px;transition:color .2s var(--ease),font-weight .2s var(--ease)}
  .wheel-col .wheel-item.active{color:var(--klein);font-weight:600;font-size:20px}
  .scale-options{display:flex;flex-direction:column;gap:8px;margin-top:8px}
  .scale-row{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.5px solid var(--line);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:12px;transition:all .25s var(--ease);cursor:pointer}
  .scale-row:active{transform:scale(.985)}
  .scale-row.selected{background:linear-gradient(135deg,var(--klein) 0%,var(--klein-light) 100%);border-color:var(--klein);box-shadow:var(--sh-blue)}
  .scale-row.selected .scale-text,.scale-row.selected .scale-dot{color:#fff}
  .scale-row.selected .scale-bar{background:rgba(255,255,255,.3)}
  .scale-row.selected .scale-bar-fill{background:#fff}
  .scale-dot{font-size:12px;color:var(--t3);min-width:18px;font-variant-numeric:tabular-nums}
  .scale-text{flex:1;font-size:15px;color:var(--t1);transition:color .25s var(--ease)}
  .scale-bar{width:60px;height:3px;background:var(--line);border-radius:99px;overflow:hidden}
  .scale-bar-fill{height:100%;background:var(--klein);border-radius:99px;transition:background .25s var(--ease)}
  .footer{flex-shrink:0;padding:16px 24px calc(20px + var(--safe-b));background:linear-gradient(180deg,rgba(251,252,254,0) 0%,rgba(251,252,254,.95) 30%,var(--bg) 100%);position:relative;z-index:5}
  .footer.hide{display:none}
  .btn{width:100%;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:16px;font-weight:500;letter-spacing:.5px;transition:all .2s var(--ease);position:relative;overflow:hidden}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:linear-gradient(135deg,var(--klein) 0%,var(--klein-light) 100%);color:#fff;box-shadow:var(--sh-blue)}
  .btn-primary:disabled{opacity:.35;box-shadow:none;cursor:not-allowed}
  .btn-primary:disabled:active{transform:none}
  .btn-primary::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent 60%);pointer-events:none}
  .btn-ghost{background:transparent;color:var(--t2);font-size:14px;height:44px}
  .btn-secondary{background:var(--bg-soft);color:var(--t1)}
  .btn .arrow{display:inline-flex;transition:transform .25s var(--ease)}
  .btn:active .arrow{transform:translateX(3px)}
  .btn-meta{font-size:11px;color:var(--t3);text-align:center;margin-top:8px;letter-spacing:.3px}
  .q-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--t3);letter-spacing:1px;margin-bottom:14px}
  .q-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--t4)}
  .q-meta .seg{color:var(--klein);font-weight:500;letter-spacing:1.2px}
  .transition-screen{justify-content:center;align-items:center;text-align:center}
  .transition-icon{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,var(--klein-glow),transparent);border:1px solid var(--line-strong);display:flex;align-items:center;justify-content:center;margin-bottom:28px;animation:pulse 2.2s var(--ease) infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--klein-glow-md)}50%{box-shadow:0 0 0 16px rgba(43,95,117,0)}}
  .transition-icon svg{width:36px;height:36px;color:var(--klein)}
  .transition-title{font-size:24px;font-weight:600;color:var(--t1);letter-spacing:-.3px;margin:0 0 8px}
  .transition-sub{font-size:14px;color:var(--t3);line-height:1.6;max-width:280px;margin:0 auto}

/* 路由 */
function computeBranch(answers){
  const meno = answers.MENO;
  const age  = computeAge(answers.BIRTH);
  if(['④','⑤','⑦'].includes(meno)) return 'B2';
  if(meno === '⑥') return 'B1';
  if(meno === '③' && age < 40)  return 'B6';
  if(meno === '③' && age >= 40) return 'B5';
  if(meno === '②' && age < 40)  return 'B6';
  if(meno === '②' && age >= 40) return 'B4';
  if(meno === '①' && age < 35)  return 'B1';
  if(meno === '①' && age >= 35 && age < 48) return 'B3';
  if(meno === '①' && age >= 48) return 'B4';
  return 'B3';
}
function computeAge(birth){
  if(!birth || !birth.y) return 35;
  const now = new Date();
  let age = now.getFullYear() - birth.y;
  if(birth.m && (now.getMonth()+1) < birth.m) age--;
  return age;
}

/* 标签生成 */
function computeTags(a){
  const tags = [];
  const T = (level, code, name) => tags.push({level, code, name});
  // S 级
  if(Array.isArray(a.B6_RISK) && a.B6_RISK.some(v=>v!=='⑦')) T('S','POI_HIGH','建议优先评估卵巢功能');
  if(Array.isArray(a.B6_TEST) && a.B6_TEST.includes('⑦') && Array.isArray(a.B6_PAT) && a.B6_PAT.length>0) T('S','POI_UNDX','建议完善卵巢功能检测');
  if(Array.isArray(a.B6_SYM) && a.B6_SYM.filter(v=>v!=='⑧').length>=3) T('S','POI_SYM','卵巢早衰症候群');
  if(a.B6_FERT==='①') T('S','POI_FERT','生育时间窗评估紧迫');
  if(['①','②'].includes(a.B2_MOOD)) T('S','PPD_RISK','建议关注产后情绪状态');
  if(Array.isArray(a.B5_GSM)){
    const cnt = a.B5_GSM.filter(v=>v!=='⑧').length;
    if(cnt>=3 || a.B5_GSM.includes('⑦')) T('S','GSM_UNDX','建议评估泌尿生殖健康');
  }
  if(a.B1_OVA==='①' && ['①','②'].includes(a.B1_OVA_R)) T('S','OVA_LOW_KNOWN','已知卵巢储备下降');
  if(a.B1_OVA==='③') T('S','OVA_CONV','卵巢储备评估窗口期');
  if(a.B5_BMD==='④') T('S','BMD_CONV','骨密度评估窗口期');
  if(Array.isArray(a.B3_HIST) && a.B3_HIST.filter(v=>v!=='⑦').length>=3) T('S','HIGH_SPEND','高抗衰投入意愿');
  // 高级
  if(['④','⑤'].includes(a.B4_HOT)) T('high','VASOMOTOR_SEV','围绝经期血管舒缩症状显著');
  if(Array.isArray(a.B2_PELV) && a.B2_PELV.filter(v=>!['⑤','⑥'].includes(v)).length>=2) T('high','PELV_HIGH','骨盆底功能需关注');
  if(Array.isArray(a.B2_VAG) && (a.B2_VAG.includes('①')||a.B2_VAG.includes('②'))) T('high','PERI_VAG_INF','围产期阴道感染需关注');
  if(['②','③','④'].includes(a.B4_HRT)) T('high','HRT_EDU','HRT 认知教育窗口');
  if((Array.isArray(a.B4_SEX) && a.B4_SEX.filter(v=>!['⑥','⑦'].includes(v)).length>=3) ||
     (Array.isArray(a.B4_GSM) && a.B4_GSM.filter(v=>v!=='⑦').length>=3)) T('high','GSM_HIGH','泌尿生殖健康需关注');
  if(Array.isArray(a.B5_COG) && a.B5_COG.filter(v=>v!=='⑥').length>=3) T('high','COG_RISK','认知功能需关注');
  if(Array.isArray(a.B5_SARC) && a.B5_SARC.filter(v=>v!=='⑥').length>=3) T('high','SARC_RISK','肌少症筛查建议');
  if(Array.isArray(a.B1_FAM) && (a.B1_FAM.includes('①')||a.B1_FAM.includes('⑤'))) T('high','EARLY_MENO_FAM','早绝经家族史');
  // 中级
  if(Array.isArray(a.CHG5Y) && a.CHG5Y.filter(v=>v!=='⑩').length>=2) T('mid','MULTI_DECLINE','多维度衰老信号');
  if(['④','⑤'].includes(a.PEER)) T('mid','SELF_DECLINE','自评衰老感较强');
  if(Array.isArray(a.VAG) && a.VAG.filter(v=>v!=='⑦').length>=2) T('mid','VAG_DISRUPT','阴道微生态紊乱信号');
  if(Array.isArray(a.VAG) && a.VAG.includes('⑥')) T('mid','RECUR_INF','反复感染史');
  if(Array.isArray(a.B1_GUT_H)){
    const hits = ['②','③','④'].filter(v=>a.B1_GUT_H.includes(v));
    if(hits.length>=2) T('mid','GUT_DYSB','肠道菌群失衡风险');
  }
  // 去重
  const seen = new Set();
  return tags.filter(t=>{ if(seen.has(t.code))return false; seen.add(t.code); return true; });
}

/* 面诊提示 */
function computeClinicAlert(answers, tags){
  if(tags.some(t=>t.code==='POI_HIGH'))
    return {level:'S',tag:'临床优先 · 专家团队对接',title:'建议尽快完善卵巢功能评估',
      desc:'建议您预约专科面诊，结合 AMH、FSH、性激素六项等专项检测，明确卵巢功能状态。'};
  if(tags.some(t=>t.code==='POI_FERT'))
    return {level:'S',tag:'生育时间窗评估',title:'建议尽快进行生育评估',
      desc:'卵巢功能与生育意愿同时存在，时间窗较为关键。建议尽快预约面诊。'};
  if(tags.some(t=>t.code==='PPD_RISK'))
    return {level:'S',tag:'情绪状态需要专业支持',title:'建议尽快获得专业支持',
      desc:'您的情绪状态值得被重视。专业的产后心理支持对您和宝宝同样重要。'};
  if(answers.B5_BMD==='③')
    return {level:'S',tag:'已确诊骨质疏松',title:'建议专科医师面诊',
      desc:'结合您的激素与代谢评估，本中心可提供综合管理方案。'};
  const high = tags.find(t=>t.level==='high');
  if(high) return {level:'high',tag:'建议尽早面诊',title:'专家团队将为您出具个性化建议',
      desc:'您的部分评估指标提示需要进一步关注，健康管理师将在 24 小时内与您联系。'};
  return null;
}

const App = {
  state:{ currentIdx:0, answers:{}, history:[0] },
  init(){ this.loadState(); this.bindEvents(); this.render(); },
  loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){ const data = JSON.parse(raw); if(data.answers) this.state.answers = data.answers; }
    }catch(e){}
  },
  saveState(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify({answers:this.state.answers,ts:Date.now()})); }catch(e){}
  },
  bindEvents(){
    document.getElementById('backBtn').addEventListener('click', ()=>this.goBack());
    document.getElementById('primaryBtn').addEventListener('click', ()=>this.onPrimary());
  },

  computeNextIdx(){
    const cur = STEPS[this.state.currentIdx];
    if(cur.id === 'D5') return STEP_IDX['branch-transition'];
    if(cur.id === 'branch-transition'){
      const br = computeBranch(this.state.answers);
      const firstQ = STEPS.findIndex(s => s.id && s.id.startsWith(br+'.'));
      return firstQ >= 0 ? firstQ : STEP_IDX['submit'];
    }
    if(cur.id && /^B\d\.\d/.test(cur.id)){
      const br = computeBranch(this.state.answers);
      if(!cur.id.startsWith(br+'.')) return STEP_IDX['submit'];
      let nextIdx = this.state.currentIdx + 1;
      while(nextIdx < STEPS.length){
        const s = STEPS[nextIdx];
        if(!s.id || !s.id.startsWith(br+'.')) return STEP_IDX['submit'];
        if(s.skipIf && s.skipIf(this.state.answers)){
          if(s.skipValue !== undefined){
            this.state.answers[s.question.field] = s.skipValue;
            this.saveState();
          }
          nextIdx++; continue;
        }
        if(s.showIf && !s.showIf(this.state.answers)){ nextIdx++; continue; }
        return nextIdx;
      }
      return STEP_IDX['submit'];
    }
    if(cur.id === 'submit') return STEP_IDX['feedback'];
    let next = this.state.currentIdx + 1;
    while(next < STEPS.length){
      const s = STEPS[next];
      if(s.skipIf && s.skipIf(this.state.answers)){
        if(s.skipValue !== undefined){ this.state.answers[s.question.field] = s.skipValue; this.saveState(); }
        next++; continue;
      }
      if(s.showIf && !s.showIf(this.state.answers)){ next++; continue; }
      break;
    }
    return next < STEPS.length ? next : -1;
  },

  next(){
    const nextIdx = this.computeNextIdx();
    if(nextIdx < 0) return;
    this.navigate(nextIdx);
  },
  goBack(){
    const cur = STEPS[this.state.currentIdx];
    if(cur.type === 'welcome' || cur.type === 'feedback') return;
    if(this.state.history.length > 1){
      this.state.history.pop();
      const prev = this.state.history[this.state.history.length-1];
      this.navigateRaw(prev);
    }else{
      this.openExitModal();
    }
  },
  navigate(idx){ this.state.history.push(idx); this.navigateRaw(idx); },
  navigateRaw(idx){
    const main = document.getElementById('main');
    const cur = main.querySelector('.screen');
    if(cur){
      cur.classList.add('leaving');
      setTimeout(()=>{ this.state.currentIdx = idx; this.render(); document.getElementById('main').scrollTop = 0; }, 220);
    }else{
      this.state.currentIdx = idx; this.render();
    }
  },
  onPrimary(){
    const cur = STEPS[this.state.currentIdx];
    if(cur.type === 'welcome' || cur.type === 'privacy' || cur.type === 'intimacy-intro' || cur.type === 'branch-transition' || cur.type === 'submit'){
      this.next(); return;
    }
    if(cur.type === 'contact'){
      if(!this.isContactValid()){ this.shake(); this.flagContactErrors(); return; }
      this.next(); return;
    }
    if(cur.type === 'report-upload'){
      this.next(); return;
    }
    if(cur.type === 'question'){
      if(!this.isAnswered(cur.question, cur)){ this.shake(); return; }
      this.next();
    }
  },
  shake(){
    const btn = document.getElementById('primaryBtn');
    btn.animate([{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(-4px)'},{transform:'translateX(0)'}],{duration:300,easing:'ease-in-out'});
  },

  render(){
    const cur = STEPS[this.state.currentIdx];
    this.renderTopbar(cur);
    this.renderMain(cur);
    this.renderFooter(cur);
    this.updateProgress();
  },
  renderTopbar(step){
    const bar = document.getElementById('topbar');
    if(step.showTopbar === false) bar.classList.add('hide');
    else bar.classList.remove('hide');
  },
  renderFooter(step){
    const ft = document.getElementById('footer');
    if(step.showFooter === false){ ft.classList.add('hide'); return; }
    if(step.type === 'question'){
      const q = step.question;
      if(q.type === 'single' || q.type === 'scale'){ ft.classList.add('hide'); return; }
      ft.classList.remove('hide');
      document.getElementById('primaryBtnText').textContent = '继续';
      document.getElementById('btnMeta').textContent = '';
      document.getElementById('primaryBtn').disabled = !this.isAnswered(q, step);
      return;
    }
    if(step.type === 'contact'){
      ft.classList.remove('hide');
      document.getElementById('primaryBtnText').textContent = step.btnText || '继续填写';
      document.getElementById('btnMeta').textContent = step.btnMeta || '';
      document.getElementById('primaryBtn').disabled = !this.isContactValid();
      return;
    }
    if(step.type === 'report-upload'){
      ft.classList.remove('hide');
      document.getElementById('primaryBtnText').textContent = step.btnText || '继续';
      document.getElementById('btnMeta').textContent = step.btnMeta || '';
      document.getElementById('primaryBtn').disabled = false;
      return;
    }
    ft.classList.remove('hide');
    document.getElementById('primaryBtnText').textContent = step.btnText || '继续';
    document.getElementById('btnMeta').textContent = step.btnMeta || '';
    document.getElementById('primaryBtn').disabled = false;
  },
  updateProgress(){
    const cur = STEPS[this.state.currentIdx];
    let pct = 0, label = '';
    if(cur.type === 'question'){
      const answered = this.state.history.filter(i => STEPS[i] && STEPS[i].type==='question').length;
      const total = 24;
      pct = Math.min(100, (answered/total)*100);
      label = `${answered} / ${total}`;
    }else if(cur.type === 'welcome'){ pct = 0; label = ''; }
    else if(cur.type === 'privacy'){ pct = 3; label = '3%'; }
    else if(cur.type === 'contact'){ pct = 6; label = '6%'; }
    else if(cur.type === 'report-upload'){ pct = 9; label = '9%'; }
    else if(cur.type === 'intimacy-intro'){ pct = 52; label = '52%'; }
    else if(cur.type === 'branch-transition'){ pct = 64; label = '64%'; }
    else if(cur.type === 'submit'){ pct = 100; label = '100%'; }
    else if(cur.type === 'feedback'){ pct = 100; label = ''; }
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = label;
  },
  renderMain(step){
    const main = document.getElementById('main');
    main.innerHTML = '';
    const screen = document.createElement('section');
    screen.className = 'screen ' + step.type;
    screen.dataset.step = step.id;
    if(step.type === 'welcome')                screen.innerHTML = this.tplWelcome();
    else if(step.type === 'privacy')           screen.innerHTML = this.tplPrivacy();
    else if(step.type === 'contact')           screen.innerHTML = this.tplContact();
    else if(step.type === 'report-upload')   screen.innerHTML = this.tplReportUpload();
    else if(step.type === 'intimacy-intro')    screen.innerHTML = this.tplIntimacyIntro();
    else if(step.type === 'branch-transition') screen.innerHTML = this.tplBranchTransition();
    else if(step.type === 'submit')            screen.innerHTML = this.tplSubmit();
    else if(step.type === 'feedback')          screen.innerHTML = this.tplFeedback();
    else if(step.type === 'question')          screen.innerHTML = this.tplQuestion(step);
    main.appendChild(screen);
    if(step.type === 'question') this.bindQuestion(step, screen);
    if(step.type === 'contact')  this.bindContact(screen);
    if(step.type === 'report-upload') this.bindReportUpload(screen);
    if(step.type === 'submit')   setTimeout(()=>{ if(STEPS[this.state.currentIdx].id==='submit') this.next(); }, 2200);
    if(step.type === 'feedback')  setTimeout(()=>{ this.uploadToCloud(); }, 800);
  },

  tplQuestion(step){
    const q = step.question;
    let body = '';
    if(q.type === 'single')           body = this.tplSingle(q);
    else if(q.type === 'multi')       body = this.tplMulti(q);
    else if(q.type === 'scale')       body = this.tplScale(q);
    else if(q.type === 'date')        body = this.tplDate(q);
    else if(q.type === 'number-dual') body = this.tplNumDual(q);
    else if(q.type === 'compound')    body = this.tplCompound(q);
    return `
      <div class="q-head stagger">
        <div class="q-meta">
          <span class="seg">${step.section || ''}</span>
          <span class="dot"></span>
          <span class="num">${step.id}</span>
        </div>
        <h2 class="q-title">${q.title}</h2>
        ${q.desc ? `<p class="q-desc">${q.desc}</p>` : ''}
      </div>
      <div class="q-body">${body}</div>`;
  },
  tplSingle(q){
    const cur = this.state.answers[q.field];
    return `<div class="options">${q.options.map(o=>`
      <div class="option ${cur===o.v?'selected':''}" data-v="${o.v}">
        <div class="option-idx">${o.v}</div>
        <div class="option-label">${o.label}</div>
        <div class="check"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></div>
      </div>`).join('')}</div>`;
  },
  tplMulti(q){
    const cur = this.state.answers[q.field] || [];
    const max = q.maxSelect || 99;
    let hideValues = q.dynamicHide ? (q.dynamicHide(this.state.answers) || []) : [];
    const visibleOpts = q.options.filter(o=>!hideValues.includes(o.v));
    return `
      <div class="options">${visibleOpts.map(o=>`
        <div class="option ${cur.includes(o.v)?'selected':''}" data-v="${o.v}">
          <div class="option-idx">${o.v}</div>
          <div class="option-label">${o.label}</div>
          <div class="check"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></div>
        </div>`).join('')}</div>
      <div class="multi-hint">已选 <span class="count">${cur.length}</span> 项${q.maxSelect && q.maxSelect<10?` · 最多 ${max} 项`:''}</div>`;
  },
  tplScale(q){
    const cur = this.state.answers[q.field];
    const total = q.options.length;
    return `<div class="scale-options">${q.options.map((o,i)=>{
      const w = ((i+1)/total)*100;
      return `<div class="scale-row ${cur===o.v?'selected':''}" data-v="${o.v}">
        <div class="scale-dot">${o.v}</div>
        <div class="scale-text">${o.label}</div>
        <div class="scale-bar"><div class="scale-bar-fill" style="width:${w}%"></div></div>
      </div>`;
    }).join('')}</div>`;
  },
  tplDate(q){
    const cur = this.state.answers[q.field] || {y:1990, m:6};
    const years = [];
    const nowY = new Date().getFullYear();
    for(let y=nowY-70; y<=nowY-15; y++) years.push(y);
    const months = [];
    for(let m=1; m<=12; m++) months.push(m);
    return `
      <div class="wheel-picker" data-field="${q.field}">
        <div class="selector"></div>
        <div class="wheel-col" id="wheelY" data-cur="${cur.y}">
          <div class="wheel-pad"></div>${years.map(y=>`<div class="wheel-item" data-v="${y}">${y} 年</div>`).join('')}<div class="wheel-pad"></div>
        </div>
        <div class="wheel-col" id="wheelM" data-cur="${cur.m}">
          <div class="wheel-pad"></div>${months.map(m=>`<div class="wheel-item" data-v="${m}">${String(m).padStart(2,'0')} 月</div>`).join('')}<div class="wheel-pad"></div>
        </div>
      </div>`;
  },
  tplNumDual(q){
    const cur = this.state.answers[q.field] || {};
    return `<div class="num-input-group">${q.fields.map(f=>`
      <div class="num-input-field" data-key="${f.key}">
        <span class="lbl">${f.label}</span>
        <input type="number" inputmode="decimal" pattern="[0-9]*" placeholder="${f.placeholder}" min="${f.min}" max="${f.max}" value="${cur[f.key]||''}">
        <span class="unit">${f.unit}</span>
      </div>`).join('')}</div>`;
  },
  tplCompound(q){
    const a = this.state.answers;
    const mainV = a[q.main.field];
    const subShow = q.sub.showIf ? q.sub.showIf(a) : true;
    const mainHTML = `
      <div class="compound-block first">
        <div class="sub-label">${q.main.label}</div>
        <div class="options">${q.main.options.map(o=>`
          <div class="option main-opt ${mainV===o.v?'selected':''}" data-v="${o.v}">
            <div class="option-idx">${o.v}</div>
            <div class="option-label">${o.label}</div>
            <div class="check"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></div>
          </div>`).join('')}</div>
      </div>`;
    let subHTML = '';
    if(subShow){
      const subV = a[q.sub.field] || [];
      subHTML = `
        <div class="compound-block">
          <div class="sub-label">${q.sub.label}</div>
          <div class="options">${q.sub.options.map(o=>`
            <div class="option sub-opt ${subV.includes(o.v)?'selected':''}" data-v="${o.v}">
              <div class="option-idx">${o.v}</div>
              <div class="option-label">${o.label}</div>
              <div class="check"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></div>
            </div>`).join('')}</div>
          <div class="multi-hint">已选 <span class="count">${subV.length}</span> 项</div>
        </div>`;
    }
    return mainHTML + subHTML;
  },

  bindQuestion(step, root){
    const q = step.question;
    if(q.type === 'single'){
      root.querySelectorAll('.option').forEach(el=>{
        el.addEventListener('click', ()=>{
          root.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
          el.classList.add('selected');
          this.state.answers[q.field] = el.dataset.v;
          this.saveState();
          setTimeout(()=>this.next(), 320);
        });
      });
    }
    if(q.type === 'multi'){
      const max = q.maxSelect || 99;
      const excV = q.exclusiveValue;
      root.querySelectorAll('.option').forEach(el=>{
        el.addEventListener('click', ()=>{
          const v = el.dataset.v;
          let arr = this.state.answers[q.field] ? [...this.state.answers[q.field]] : [];
          if(excV){
            if(v === excV){
              arr = arr.includes(excV) ? [] : [excV];
              this.state.answers[q.field] = arr;
              this.saveState(); this.rerenderMulti(root); this.renderFooter(step); return;
            }else{
              arr = arr.filter(x=>x !== excV);
            }
          }
          if(arr.includes(v)) arr = arr.filter(x=>x!==v);
          else{ if(arr.length >= max){ this.shake(); return; } arr.push(v); }
          this.state.answers[q.field] = arr;
          this.saveState(); this.rerenderMulti(root); this.renderFooter(step);
        });
      });
    }
    if(q.type === 'scale'){
      root.querySelectorAll('.scale-row').forEach(el=>{
        el.addEventListener('click', ()=>{
          root.querySelectorAll('.scale-row').forEach(o=>o.classList.remove('selected'));
          el.classList.add('selected');
          this.state.answers[q.field] = el.dataset.v;
          this.saveState();
          setTimeout(()=>this.next(), 340);
        });
      });
    }
    if(q.type === 'date')        this.initWheel(root, q);
    if(q.type === 'number-dual') this.initNumDual(root, q, step);
    if(q.type === 'compound')    this.initCompound(root, q, step);
  },
  rerenderMulti(root){
    const q = STEPS[this.state.currentIdx].question;
    const arr = this.state.answers[q.field] || [];
    root.querySelectorAll('.option').forEach(el=>{
      el.classList.toggle('selected', arr.includes(el.dataset.v));
    });
    const hint = root.querySelector('.multi-hint .count');
    if(hint) hint.textContent = arr.length;
  },
  initNumDual(root, q, step){
    const inputs = root.querySelectorAll('.num-input-field input');
    const update = ()=>{
      const obj = {};
      inputs.forEach(inp=>{
        const k = inp.closest('.num-input-field').dataset.key;
        const v = parseFloat(inp.value);
        if(!isNaN(v)) obj[k] = v;
      });
      this.state.answers[q.field] = obj;
      this.saveState(); this.renderFooter(step);
    };
    inputs.forEach(inp=> inp.addEventListener('input', update));
    setTimeout(()=>{ inputs[0] && inputs[0].focus(); }, 400);
  },
  initWheel(root, q){
    const yCol = root.querySelector('#wheelY');
    const mCol = root.querySelector('#wheelM');
    const updateActive = (col)=>{
      const items = col.querySelectorAll('.wheel-item');
      const colRect = col.getBoundingClientRect();
      const center = colRect.top + colRect.height/2;
      let nearest=null,minD=Infinity;
      items.forEach(it=>{
        const r = it.getBoundingClientRect();
        const d = Math.abs((r.top+r.height/2) - center);
        if(d<minD){minD=d;nearest=it}
      });
      items.forEach(it=>it.classList.toggle('active', it===nearest));
      return nearest ? nearest.dataset.v : null;
    };
    const saveDate = ()=>{
      const y = parseInt(updateActive(yCol));
      const m = parseInt(updateActive(mCol));
      if(y && m){
        this.state.answers[q.field] = {y, m};
        this.saveState();
        this.renderFooter(STEPS[this.state.currentIdx]);
      }
    };
    requestAnimationFrame(()=>{
      const curY = parseInt(yCol.dataset.cur);
      const curM = parseInt(mCol.dataset.cur);
      const yTarget = yCol.querySelector(`[data-v="${curY}"]`);
      const mTarget = mCol.querySelector(`[data-v="${curM}"]`);
      if(yTarget) yCol.scrollTop = yTarget.offsetTop - 80;
      if(mTarget) mCol.scrollTop = mTarget.offsetTop - 80;
      setTimeout(saveDate, 100);
    });
    let yTimer,mTimer;
    yCol.addEventListener('scroll', ()=>{clearTimeout(yTimer); yTimer=setTimeout(saveDate,80); updateActive(yCol)});
    mCol.addEventListener('scroll', ()=>{clearTimeout(mTimer); mTimer=setTimeout(saveDate,80); updateActive(mCol)});
  },
  initCompound(root, q, step){
    root.querySelectorAll('.main-opt').forEach(el=>{
      el.addEventListener('click', ()=>{
        root.querySelectorAll('.main-opt').forEach(o=>o.classList.remove('selected'));
        el.classList.add('selected');
        this.state.answers[q.main.field] = el.dataset.v;
        this.saveState();
        const screen = root.closest('.screen');
        screen.querySelector('.q-body').innerHTML = this.tplCompound(q);
        this.bindQuestion(step, screen);
        this.renderFooter(step);
      });
    });
    const subF = q.sub.field; const subExc = q.sub.exclusiveValue;
    root.querySelectorAll('.sub-opt').forEach(el=>{
      el.addEventListener('click', ()=>{
        const v = el.dataset.v;
        let arr = this.state.answers[subF] ? [...this.state.answers[subF]] : [];
        if(subExc){
          if(v === subExc){ arr = arr.includes(subExc) ? [] : [subExc]; }
          else{
            arr = arr.filter(x=>x!==subExc);
            if(arr.includes(v)) arr = arr.filter(x=>x!==v);
            else arr.push(v);
          }
        }else{
          if(arr.includes(v)) arr = arr.filter(x=>x!==v);
          else arr.push(v);
        }
        this.state.answers[subF] = arr;
        this.saveState();
        root.querySelectorAll('.sub-opt').forEach(o=>{
          o.classList.toggle('selected', arr.includes(o.dataset.v));
        });
        const hint = root.querySelector('.multi-hint .count');
        if(hint) hint.textContent = arr.length;
        this.renderFooter(step);
      });
    });
  },

  isAnswered(q, step){
    const v = this.state.answers[q.field];
    if(q.type === 'single' || q.type === 'scale') return !!v;
    if(q.type === 'multi') return Array.isArray(v) && v.length>0;
    if(q.type === 'date')  return v && v.y && v.m;
    if(q.type === 'number-dual'){
      if(!v) return false;
      return q.fields.every(f=>{ const x = v[f.key]; return x && x >= f.min && x <= f.max; });
    }
    if(q.type === 'compound'){
      const mainV = this.state.answers[q.main.field];
      if(!mainV) return false;
      const subShow = q.sub.showIf ? q.sub.showIf(this.state.answers) : true;
      if(subShow){
        const subV = this.state.answers[q.sub.field];
        return Array.isArray(subV) && subV.length>0;
      }
      return true;
    }
    return false;
  },

<script src="https://static.cloudbase.net/cloudbase-js-sdk/2.17.3/cloudbase.full.js"></script>
<script>
// 腾讯云云开发 - 调用云函数（写库 + 企微通知）
const CLOUDBASE_UPLOADED_KEY = 'fhp_universal_uploaded_v1';
const ENV_ID = 'yuecheng-survey-d4fucklsf6b68aaf';
const NOTIFY_FUNCTION = 'notify-new-survey';

async function initCloudBase() {
  try {
    if (typeof cloudbase === 'undefined') return null;
    const app = cloudbase.init({ env: ENV_ID });
    await app.auth().signInAnonymously();
    return app;
  } catch(e) {
    console.error('CloudBase init failed', e);
    return null;
  }
}

async function uploadSurveyData(answers, branch, branchName, age, tags, alertInfo, filledCount) {
  try {
    const last = localStorage.getItem(CLOUDBASE_UPLOADED_KEY);
    if (last) {
      const hours = (Date.now() - parseInt(last)) / (1000 * 60 * 60);
      if (hours < 24) {
        console.log('CloudBase: already uploaded within 24h');
        return;
      }
    }

    const app = await initCloudBase();
    if (!app) return;

    const contact = (answers && answers.CONTACT) ? {
      name:   (answers.CONTACT.name   || '').trim(),
      phone:  (answers.CONTACT.phone  || '').trim(),
      wechat: (answers.CONTACT.wechat || '').trim(),
      city:   (answers.CONTACT.city   || '').trim()
    } : { name:'', phone:'', wechat:'', city:'' };

    const payload = {
      action:      'submit_survey',
      contact:     contact,
      answers:     answers,
      branch:      branch,
      branchName:  branchName,
      age:         age,
      tags:        tags,
      alert:       alertInfo,
      filledCount: filledCount,
      reportWill:  answers.REPORT_WILL || [],
      channel:     CHANNEL,
      userAgent:   navigator.userAgent,
      screenWidth: window.innerWidth,
      timestamp:   Date.now()
    };

    const res = await app.callFunction({
      name: NOTIFY_FUNCTION,
      data: payload
    });

    if (res && res.result && res.result.success) {
      localStorage.setItem(CLOUDBASE_UPLOADED_KEY, Date.now().toString());
      console.log('Survey: upload + notify success', res.result);
    } else {
      console.warn('Survey: cloud function returned non-success', res);
    }
  } catch(e) {
    console.error('Survey upload failed', e);
  }
}
</script>
